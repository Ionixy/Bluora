<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluora Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #333333; /* Чуть светлее фон карточки как на фото 2 */
            --detail-bg: #444444; /* Фон подложки */
            --specs-bg: #242424; /* Темный блок характеристик из фото 1 */
            --text-white: #ffffff;
            --accent-white: #ffffff;
            --text-dark: #000000;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: 80px;
            margin: 40px 0;
            text-align: center;
            font-weight: 400;
            cursor: pointer;
        }

        #main-view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
            padding: 0 15px;
        }

        .cat-btn {
            background-color: var(--accent-white);
            color: var(--text-dark);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px; 
            cursor: pointer;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1100px;
            width: 90%;
            padding-bottom: 50px;
        }

        /* КАРТОЧКА В КАТАЛОГЕ */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }

        .image-container {
            width: 100%;
            aspect-ratio: 1 / 1.2;
            background-color: #eee;
            cursor: pointer;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .item-name {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .item-type {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .btn {
            background-color: var(--accent-white);
            color: var(--text-dark);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: auto;
        }

        /* КАРТОЧКА ДЕТАЛЕЙ (ОФОРМЛЕНИЕ 2 + ОПИСАНИЕ 1) */
        #detail-view {
            display: none;
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            animation: fadeIn 0.3s ease;
        }
        
        .detail-card { 
            background-color: var(--card-bg); 
            border-radius: 30px; 
            padding: 40px; 
            display: flex; 
            gap: 50px; 
            align-items: flex-start; 
        }

        .detail-slider { 
            flex: 1.1; 
            background-color: white; 
            border-radius: 20px; 
            aspect-ratio: 1 / 1.2; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
        }
        .detail-slider img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .slider-btn { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            background: rgba(0,0,0,0.5); 
            color: white;
            border: none; 
            width: 40px; height: 40px; 
            border-radius: 50%; 
            cursor: pointer; 
            z-index: 2; 
        }
        .slider-btn-prev { left: 15px; } 
        .slider-btn-next { right: 15px; }
        
        .detail-info { 
            flex: 1; 
            display: flex;
            flex-direction: column;
        }
        
        .detail-name { 
            font-size: 42px; 
            font-weight: 800; 
            margin: 0 0 10px 0;
            line-height: 1.1;
        }
        
        .detail-desc { 
            font-size: 16px; 
            color: var(--text-white);
            margin-bottom: 25px; 
            line-height: 1.4; 
        }
        
        /* Блок характеристик как на ФОТО 1 */
        .detail-specs-box {
            background-color: var(--specs-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 40px;
        }

        .detail-specs { 
            margin: 0;
            font-size: 15px; 
            line-height: 1.8; 
            color: var(--text-white);
            white-space: pre-line;
        }
        
        .detail-buy-btn { 
            background-color: var(--accent-white); 
            color: var(--text-dark); 
            text-decoration: none; 
            padding: 18px 0; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 18px;
            display: block; 
            text-align: center;
            text-transform: uppercase;
        }

        .detail-cancel-btn { 
            background: none; 
            border: none; 
            color: var(--text-gray); 
            margin-top: 20px; 
            cursor: pointer; 
            font-size: 15px;
            text-decoration: underline;
            text-align: center;
        }

        @media (max-width: 900px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-card { flex-direction: column; padding: 20px; gap: 30px;}
            .detail-name { font-size: 32px; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="logo" onclick="closeDetail()">Bluora</div>

    <div id="main-view">
        <nav class="categories">
            <button class="cat-btn" onclick="filter('all')">ALL</button>
            <button class="cat-btn" onclick="filter('shirts')">SHIRTS</button>
            <button class="cat-btn" onclick="filter('pants')">PANTS</button>
            <button class="cat-btn" onclick="filter('hoodies')">HOODIES</button>
            <button class="cat-btn" onclick="filter('shoes')">SHOES</button>
        </nav>
        <main class="product-grid" id="grid"></main>
    </div>

    <div id="detail-view">
        <div class="detail-card">
            <div class="detail-slider">
                <button class="slider-btn slider-btn-prev" onclick="prevImg()">&#10094;</button>
                <img id="detail-img" src="" alt="">
                <button class="slider-btn slider-btn-next" onclick="nextImg()">&#10095;</button>
            </div>
            <div class="detail-info">
                <h2 class="detail-name" id="detail-name">Clothes Name</h2>
                <div class="detail-desc" id="detail-desc">Много места для описания предмета...</div>
                
                <div class="detail-specs-box">
                    <div class="detail-specs" id="detail-specs"></div>
                </div>

                <a href="https://web.telegram.org/k/#@bluorabot" class="detail-buy-btn" target="_blank">BUY</a>
                <button class="detail-cancel-btn" onclick="closeDetail()">cancel</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                name: "Stone Island Sweater (Washed)",
                type: "Replica",
                category: "hoodies",
                images: ["https://i.postimg.cc/85zK6L3t/image-62795b.png"],
                description: "Свитер Стонайланд с эффектом выцветания ткани. Мягкий хлопок, премиальное качество.",
                specs: "- цвета: Dark Gray, Black\n- размеры: M, L, XL, 2XL\n- И т.д."
            },
            {
                id: 2,
                name: "Acne Studio Hoodie",
                type: "Replica",
                category: "hoodies",
                images: ["https://i.postimg.cc/85zK6L3t/image-62795b.png"],
                description: "Классический оверсайз крой от Acne. Плотный материал.",
                specs: "- цвета: Black, Pink\n- размеры: S, M, L"
            }
        ];

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(item => `
                <div class="card">
                    <div class="image-container" onclick="openDetail(${item.id})">
                        <img src="${item.images[0]}" alt="${item.name}">
                    </div>
                    <div class="info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-type">${item.type}</span>
                        <button class="btn" onclick="openDetail(${item.id})">INFO</button>
                    </div>
                </div>
            `).join('');
        }

        let currentItem = null;
        let currentImgIndex = 0;

        function openDetail(id) {
            currentItem = products.find(p => p.id === id);
            if (!currentItem) return;
            document.getElementById('detail-name').innerText = currentItem.name;
            document.getElementById('detail-desc').innerText = currentItem.description;
            document.getElementById('detail-specs').innerText = currentItem.specs;
            currentImgIndex = 0;
            updateSliderView();
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }

        function updateSliderView() {
            document.getElementById('detail-img').src = currentItem.images[currentImgIndex];
        }

        function nextImg() {
            currentImgIndex = (currentImgIndex + 1) % currentItem.images.length;
            updateSliderView();
        }

        function prevImg() {
            currentImgIndex = (currentImgIndex - 1 + currentItem.images.length) % currentItem.images.length;
            updateSliderView();
        }

        function filter(cat) { 
            render(cat === 'all' ? products : products.filter(p => p.category === cat)); 
        }

        render(products);
    </script>
</body>
</html>
