<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluora Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Палитра на основе ваших изображений */
            --bg-color: #0f0f0f;      /* Глубокий черный фон страницы */
            --card-bg: #1c1c1c;       /* Темно-серый для карточек в сетке */
            --detail-bg: #1c1c1c;     /* Фон модального окна товара */
            --specs-bg: #121212;      /* Угольный фон для блока характеристик (как на фото 1) */
            --text-white: #ffffff;
            --accent-white: #ffffff;
            --text-dark: #000000;
            --text-gray: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: 80px;
            margin: 30px 0;
            text-align: center;
            font-weight: 400;
            cursor: pointer;
        }

        #main-view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ОФОРМЛЕНИЕ ВКЛАДОК */
        .categories {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
            padding: 0 15px;
        }

        .cat-btn {
            background-color: var(--accent-white);
            color: var(--text-dark);
            border: none;
            padding: 10px 22px;
            border-radius: 25px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px; 
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .cat-btn:hover { opacity: 0.9; transform: scale(1.03); }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1200px;
            width: 90%;
            padding-bottom: 50px;
        }

        /* КАРТОЧКА ТОВАРА */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-8px); }

        .image-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #f5f5f5; /* Светлый фон для превью, чтобы вещь выделялась */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .item-name {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .item-type {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .btn {
            background-color: var(--accent-white);
            color: var(--text-dark);
            border: none;
            padding: 12px 0;
            border-radius: 10px; 
            font-weight: 800; 
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: auto;
        }

        /* ОФОРМЛЕНИЕ ОТКРЫТОГО ТОВАРА (ПК ВЕРСИЯ) */
        #detail-view {
            display: none;
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            animation: fadeIn 0.4s ease;
        }
        
        .detail-card { 
            background-color: var(--detail-bg); 
            border-radius: 24px; 
            padding: 40px; 
            display: flex; 
            gap: 50px; 
            align-items: flex-start;
        }

        .detail-slider { 
            flex: 1; 
            background-color: #ffffff; 
            border-radius: 16px; 
            aspect-ratio: 1 / 1;
            position: relative; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
        }
        .detail-slider img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
        
        .slider-btn { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            background: rgba(0, 0, 0, 0.4); 
            color: white;
            border: none; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .detail-info { 
            flex: 1; 
            display: flex;
            flex-direction: column;
        }
        
        .detail-name { 
            font-size: 32px; 
            font-weight: 800; 
            margin: 0 0 10px 0; 
        }
        
        .detail-desc { 
            font-size: 15px; 
            color: var(--text-gray);
            margin-bottom: 25px; 
            line-height: 1.5; 
        }
        
        /* ТЕМНЫЙ БЛОК ХАРАКТЕРИСТИК (Как на фото 1) */
        .detail-specs-box {
            background-color: var(--specs-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .detail-specs { 
            font-size: 14px; 
            line-height: 1.8; 
            color: #ccc;
            white-space: pre-line;
        }
        
        .detail-buy-btn { 
            background-color: var(--accent-white); 
            color: var(--text-dark); 
            text-decoration: none; 
            padding: 18px 0; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 16px;
            display: block; 
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-back { 
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-gray);
            text-decoration: underline;
            font-size: 14px;
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
        }

        @media (max-width: 950px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-card { flex-direction: column; padding: 25px; }
            .detail-slider { width: 100%; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="logo" onclick="closeDetail()">Bluora</div>

    <div id="main-view">
        <nav class="categories">
            <button class="cat-btn" onclick="filter('all')">ALL</button>
            <button class="cat-btn" onclick="filter('sweaters')">SWEATERS</button>
            <button class="cat-btn" onclick="filter('hoodies')">HOODIES</button>
            <button class="cat-btn" onclick="filter('pants')">PANTS</button>
            <button class="cat-btn" onclick="filter('t-shirts')">T-SHIRTS</button>
        </nav>
        <main class="product-grid" id="grid"></main>
    </div>

    <div id="detail-view">
        <div class="detail-card">
            <div class="detail-slider">
                <button class="slider-btn" style="left:10px" onclick="prevImg()">&#10094;</button>
                <img id="detail-img" src="" alt="">
                <button class="slider-btn" style="right:10px" onclick="nextImg()">&#10095;</button>
            </div>
            <div class="detail-info">
                <h2 class="detail-name" id="detail-name">Clothes Name</h2>
                <div class="detail-desc" id="detail-desc"></div>
                
                <div class="detail-specs-box">
                    <div class="detail-specs" id="detail-specs"></div>
                </div>
                
                <a href="https://t.me/your_bot" class="detail-buy-btn" target="_blank">ORDER VIA TELEGRAM</a>
                <button class="detail-back" onclick="closeDetail()">Back to catalog</button>
            </div>
        </div>
    </div>

    <script>
        // Данные для примера
        const products = [
            {
                id: 1,
                name: "Acne Hoodie",
                type: "320$ P",
                category: "hoodies",
                images: ["https://i.postimg.cc/85zK6L3t/image-62795b.png"], 
                description: "Свободное худи из плотного хлопка",
                specs: "- цвета: Black, Gray\n- размеры: S, M, L"
            },
            {
                id: 2,
                name: "Stone Island Sweater (Washed)",
                type: "325$ P",
                category: "sweaters",
                images: ["https://i.postimg.cc/85zK6L3t/image-62795b.png"],
                description: "Свитер Стонайланд с эффектом выцветания ткани",
                specs: "- цвета: Dark Gray, Black\n- размеры: M, L, XL, 2XL"
            },
            {
                id: 3,
                name: "Balenciaga Runners",
                type: "250$ P",
                category: "shoes",
                images: ["https://i.postimg.cc/85zK6L3t/image-62795b.png"],
                description: "Кроссовки с уникальным дизайном подошвы",
                specs: "- цвета: OG Colorway\n- размеры: 39-45"
            },
            {
                id: 4,
                name: "Supreme T-Shirt",
                type: "250$ P",
                category: "t-shirts",
                images: ["https://i.postimg.cc/85zK6L3t/image-62795b.png"],
                description: "Классическая футболка с логотипом",
                specs: "- цвета: White, Red\n- размеры: M, L, XL"
            }
        ];

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(item => `
                <div class="card">
                    <div class="image-container" onclick="openDetail(${item.id})">
                        <img src="${item.images[0]}" alt="${item.name}">
                    </div>
                    <div class="info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-type">${item.type}</span>
                        <button class="btn" onclick="openDetail(${item.id})">INFO</button>
                    </div>
                </div>
            `).join('');
        }

        let currentItem = null;
        let currentImgIndex = 0;

        function openDetail(id) {
            currentItem = products.find(p => p.id === id);
            if (!currentItem) return;
            document.getElementById('detail-name').innerText = currentItem.name;
            document.getElementById('detail-desc').innerText = currentItem.description;
            document.getElementById('detail-specs').innerText = currentItem.specs;
            currentImgIndex = 0;
            updateSliderView();
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }

        function updateSliderView() {
            document.getElementById('detail-img').src = currentItem.images[currentImgIndex];
        }

        function nextImg() {
            currentImgIndex = (currentImgIndex + 1) % currentItem.images.length;
            updateSliderView();
        }

        function prevImg() {
            currentImgIndex = (currentImgIndex - 1 + currentItem.images.length) % currentItem.images.length;
            updateSliderView();
        }

        function filter(cat) { 
            render(cat === 'all' ? products : products.filter(p => p.category === cat)); 
        }

        render(products);
    </script>
</body>
</html>
