        body {

            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1rem;
            transition: 0.2s;
            text-decoration: none;
        }
        .nav-center {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            flex: 1;
            justify-content: center;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
        }
        .search-box i { opacity: 0.75; font-size: 0.9rem; }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 0.85rem;
            width: 140px;
        }
        .filter-btns { display: flex; gap: 6px; }
        .filter-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: 70px;
            text-align: center;
            margin: 5px 0 15px;
            cursor: pointer;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }
        /* Категории — адаптивный скролл при необходимости */
        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }
        .cat-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        /* Сетка товаров — гибкая */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .image-container {
            position: relative;
            width: 90%;
            aspect-ratio: 4 / 5;
            margin: 12px auto 0;
            background: #444;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }
        .new-badge {

            left: 8px;
            background: #ff3b30;

            { id: 22, name: "Supreme Satin Applique Hoodie", type: "Replica", category: "hoodies", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1773691224/SUCHKA1_00039_b3epqb.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773691224/SUCHKA1_00040_ajg4wl.png"], description: "Supreme Satin Appliqué Hoodie", specs: "- Colors : Black and White, Gray and White\n- Sizes : S-XL", isNewDrop: false, newDropUntil: null },
            { id: 23, name: "ERD Hoodie", type: "Replica", category: "hoodies", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1773691224/SUCHKA1_00041_glio30.png"], description: "ERD Hoodie with print", specs: "- Colors : Floral Gray\n- Sizes : S-XL", isNewDrop: false, newDropUntil: null },
            { id: 24, name: "Typography Tee", type: "Replica", category: "shirts", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1773691225/SUCHKA1_00042_wkkejy.png"], description: "Archive Tee", specs: "- Colors : Black\n- Sizes : M-4XL", isNewDrop: false, newDropUntil: null },
            { id: 25, name: "Acne Studio Longsleeve", type: "Replica", category: "shirts", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1773775091/A1_00043_a79grl.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773775090/A1_00044_t2mgdc.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773775092/A1_00045_atthku.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773775090/A1_00044_t2mgdc.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773775091/A1_00047_l3ebyy.png"], description: "Acne Studios 1996 stamp logo", specs: "- Colors : White, Black, Pink, Sky Blue, Green, Navy Blue, Wine Red\n- Sizes : S-L", isNewDrop: false, newDropUntil: null },
            { id: 26, name: "Ysl Sweatshirt", type: "Replica", category: "hoodies", images: ["https://res.cloudinary.com/dicw3zojk/image/upload/v1774120524/suchka_nxfccj.png"], description: "Navy Blue Ysl sweatshirt", specs: "- Colors : White, Navy Blue\n- Sizes : S-2XL", isNewDrop: false, newDropUntil: null },
            { id: 27, name: "Balenciaga Double Waist Shorts", type: "Replica", category: "pants", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1774197230/Balcncn_fne9fu.png"], description: "Double Waist Balenciaga shorts", specs: "- Colors : White, Black\n- Sizes : S-XL", isNewDrop: false, newDropUntil: null },
            { id: 28, name: "Balenciaga Double Waist Shorts", type: "Replica", category: "pants", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1774198600/badshgjbajdh_scyity.png"], description: "Double Waist Balenciaga shorts", specs: "- Colors : White, Black\n- Sizes : S-XL", isNewDrop: false, newDropUntil: null }
        ];

        let currentCategory = 'all', currentSearch = '', currentTopFilter = 'all', currentDetailItem = null, currentImgIndex = 0, isAdminAuthenticated = false;
        const ADMIN_PASSWORD = "U_!2sQodiKL9-?2";

        function isProductNew(p) { return p.isNewDrop && p.newDropUntil && Date.now() < p.newDropUntil; }
        function getSortedProducts() {
            const newDrop = products.filter(p => isProductNew(p)).sort((a,b)=>b.id-a.id);
            const regular = products.filter(p => !isProductNew(p)).sort((a,b)=>b.id-a.id);
            return [...newDrop, ...regular];
        }
        function renderProducts() {
            let filtered = getSortedProducts().filter(p => {
                if (currentSearch && !p.name.toLowerCase().includes(currentSearch.toLowerCase())) return false;
                if (currentCategory !== 'all' && p.category !== currentCategory) return false;
                if (currentTopFilter === 'new' && !isProductNew(p)) return false;
                return true;
            });
            document.getElementById('productCounter').innerText = `📦 ${filtered.length} product${filtered.length !== 1 ? 's' : ''} found`;
            const grid = document.getElementById('grid');
            if (!filtered.length) { grid.innerHTML = '<div style="text-align:center; grid-column:1/-1; padding:40px;">No products found</div>'; return; }
            grid.innerHTML = filtered.map(p => `<div class="card"><div class="image-container" onclick="openDetail(${p.id})">${isProductNew(p) ? '<span class="new-badge">NEW DROP</span>' : ''}<img src="${p.images[0]}" loading="lazy"></div><div class="info"><div class="name-type">${p.name}<span class="item-type">${p.type}</span></div><button class="btn-buy" onclick="openDetail(${p.id})">DETAILS</button></div></div>`).join('');
        }
        function openDetail(id) {
            const p = products.find(p=>p.id===id);
            if(!p) return;
            currentDetailItem = p;
            currentImgIndex = 0;
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('detail-name').innerText = p.name;
            document.getElementById('detail-desc').innerHTML = p.description;
            let lines = p.specs.split('\n');
            let formattedLines = lines.map(line => {
                if (line.trim().startsWith('- ')) {
                    return line.replace(/^(- .*?)(:| :)/, '<span class="spec-bold">$1$2</span>');
                }
                return line;
            });
            document.getElementById('detail-specs').innerHTML = formattedLines.join('<br>');
            const hasMultiple = p.images.length > 1;
            document.getElementById('prevBtn').style.display = hasMultiple ? 'flex' : 'none';
            document.getElementById('nextBtn').style.display = hasMultiple ? 'flex' : 'none';
            updateDetailImage();
            renderThumbnails();
        }
        function updateDetailImage() {
            const img = document.getElementById('detail-img');
            if(currentDetailItem?.images.length) img.src = currentDetailItem.images[currentImgIndex % currentDetailItem.images.length];
            document.querySelectorAll('.thumbnail').forEach((thumb, idx) => {
                if(idx === currentImgIndex) thumb.classList.add('active');
                else thumb.classList.remove('active');
            });
        }
        function renderThumbnails() {
            const strip = document.getElementById('thumbnailStrip');
            if(!currentDetailItem) return;
            if(currentDetailItem.images.length <= 1) { strip.innerHTML = ''; return; }
            strip.innerHTML = currentDetailItem.images.map((img, idx) => `<img class="thumbnail ${idx === currentImgIndex ? 'active' : ''}" src="${img}" onclick="setImageIndex(${idx})">`).join('');
        }
        function setImageIndex(idx) { currentImgIndex = idx; updateDetailImage(); }
        function nextImg() { if(currentDetailItem?.images.length>1) { currentImgIndex = (currentImgIndex+1)%currentDetailItem.images.length; updateDetailImage(); } }
        function prevImg() { if(currentDetailItem?.images.length>1) { currentImgIndex = (currentImgIndex-1+currentDetailItem.images.length)%currentDetailItem.images.length; updateDetailImage(); } }
        function closeDetail() { document.getElementById('main-view').style.display='block'; document.getElementById('detail-view').style.display='none'; renderProducts(); }
        function initFilters() {
            document.getElementById('searchInput').addEventListener('input', e=>{ currentSearch=e.target.value; renderProducts(); });
            document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentTopFilter=btn.dataset.filter; renderProducts(); }));
            document.querySelectorAll('.cat-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentCategory=btn.dataset.cat; renderProducts(); }));
        }

        // Admin panel (без изменений, только адаптивные стили уже в CSS)
        let editingProductId = null;
        function showPasswordModal() { document.getElementById('passwordModal').classList.add('active'); document.getElementById('adminPassword').focus(); }
        function checkPasswordAndOpenAdmin() { if(document.getElementById('adminPassword').value===ADMIN_PASSWORD) { isAdminAuthenticated=true; document.getElementById('passwordModal').classList.remove('active'); openAdminPanel(); } else { document.getElementById('passwordError').innerText='Wrong password.'; } }
        function openAdminPanel() { if(!isAdminAuthenticated) { showPasswordModal(); return; } editingProductId=null; renderAdminPanel(); document.getElementById('adminModal').classList.add('active'); }
        function renderAdminPanel() {
            const container = document.getElementById('adminPanelContent');
            const sorted = getSortedProducts();
            container.innerHTML = `
                <div class="admin-header"><h2><i class="fas fa-tools"></i> Admin Dashboard</h2><button class="close-admin" onclick="closeAdminModal()">&times;</button></div>
                <div class="admin-search"><input type="text" id="adminSearchInput" placeholder="🔍 Search products..."></div>
                <div style="margin-bottom:20px;"><h3>Products List</h3><div class="admin-products-grid" id="adminProductsGrid"></div></div>
                <div class="admin-form" id="adminForm"><h3 style="margin-top:0; margin-bottom:1rem;">➕ Add New Product</h3><div class="form-row"><input type="text" id="prodName" placeholder="Product Name"><select id="prodCategory"><option value="shirts">SHIRTS</option><option value="pants">PANTS</option><option value="hoodies">HOODIES</option><option value="hats">HATS</option><option value="shoes">SHOES</option><option value="accessories">ACCESSORIES</option></select></div>
                <div class="form-row"><input type="text" id="prodImages" placeholder="Image URLs (comma separated)"><input type="text" id="prodSpecs" placeholder="Specifications (use format \"- Color : value\\n- Size : value\")"></div>
                <div id="imagePreviewContainer" class="image-preview"></div>
                <textarea id="prodDesc" placeholder="Description"></textarea>
                <label class="checkbox-label"><input type="checkbox" id="prodIsNew"> <span>🔥 Mark as New Drop</span></label>
                <div class="form-actions"><button class="btn-secondary" onclick="resetAdminForm()">Cancel</button><button class="btn-primary" id="saveProductBtn">Save Product</button></div></div>`;
            const renderAdminList = () => {
                const searchVal = document.getElementById('adminSearchInput')?.value.toLowerCase() || '';
                const filtered = sorted.filter(p => p.name.toLowerCase().includes(searchVal));
                const gridDiv = document.getElementById('adminProductsGrid');
                gridDiv.innerHTML = filtered.map(p => `<div class="admin-product-card"><img class="admin-product-img" src="${p.images[0]}"><div class="admin-product-info"><div class="admin-product-name">${p.name}</div><div class="admin-product-cat">${p.category}</div></div><div class="admin-product-actions"><button class="edit-btn" onclick="editProductForm(${p.id})" title="Edit"><i class="fas fa-edit"></i></button><button class="clone-btn" onclick="cloneProduct(${p.id})" title="Clone"><i class="fas fa-copy"></i></button><button class="delete-btn" onclick="deleteProductConfirm(${p.id})" title="Delete"><i class="fas fa-trash-alt"></i></button></div></div>`).join('');
            };
            setTimeout(() => {
                const searchInput = document.getElementById('adminSearchInput');
                if(searchInput) searchInput.addEventListener('input', renderAdminList);
                renderAdminList();
                document.getElementById('saveProductBtn').onclick = () => saveProduct();
                attachImagePreview();
            }, 10);
        }
        function attachImagePreview() {
            const imagesInput = document.getElementById('prodImages');
            const previewDiv = document.getElementById('imagePreviewContainer');
            const updatePreview = () => {
                let urls = imagesInput.value.split(',').map(s=>s.trim()).filter(s=>s);
                previewDiv.innerHTML = urls.map(url => `<img src="${url}" onerror="this.style.opacity='0.3'">`).join('');
            };
            imagesInput.addEventListener('input', updatePreview);
            updatePreview();
        }
        function resetAdminForm() { editingProductId=null; document.getElementById('prodName').value=''; document.getElementById('prodCategory').value='shirts'; document.getElementById('prodImages').value=''; document.getElementById('prodSpecs').value=''; document.getElementById('prodDesc').value=''; document.getElementById('prodIsNew').checked=false; attachImagePreview(); }
        function editProductForm(id) { const p=products.find(p=>p.id===id); if(!p) return; editingProductId=id; document.getElementById('prodName').value=p.name; document.getElementById('prodCategory').value=p.category; document.getElementById('prodImages').value=p.images.join(', '); document.getElementById('prodSpecs').value=p.specs; document.getElementById('prodDesc').value=p.description; document.getElementById('prodIsNew').checked=p.isNewDrop; attachImagePreview(); document.getElementById('adminForm').scrollIntoView({behavior:'smooth'}); }
        function cloneProduct(id) { const original=products.find(p=>p.id===id); if(!original) return; const newId=Math.max(...products.map(p=>p.id),0)+1; const clone={...original, id:newId, name:original.name+' (copy)', isNewDrop:false, newDropUntil:null}; products.push(clone); renderAdminPanel(); renderProducts(); }
        function saveProduct() { const name=document.getElementById('prodName').value.trim(); if(!name) return alert('Name required'); const category=document.getElementById('prodCategory').value; let imagesRaw=document.getElementById('prodImages').value; let images=imagesRaw?imagesRaw.split(',').map(s=>s.trim()).filter(s=>s):['https://picsum.photos/id/1/400/500']; const desc=document.getElementById('prodDesc').value||'No description'; let specs=document.getElementById('prodSpecs').value||'- Colors : ...\n- Sizes : ...'; const isNew=document.getElementById('prodIsNew').checked; if(editingProductId!==null){ const idx=products.findIndex(p=>p.id===editingProductId); if(idx!==-1){ products[idx]={...products[idx], name, category, images, description:desc, specs, isNewDrop:isNew, newDropUntil:isNew?Date.now()+7*24*60*60*1000:null}; } } else { const newId=Math.max(...products.map(p=>p.id),0)+1; products.push({id:newId, name, type:'Replica', category, images, description:desc, specs, isNewDrop:isNew, newDropUntil:isNew?Date.now()+7*24*60*60*1000:null}); } renderAdminPanel(); renderProducts(); if(currentDetailItem && !products.find(p=>p.id===currentDetailItem.id)) closeDetail(); }
        function deleteProductConfirm(id) { const p=products.find(p=>p.id===id); if(confirm(`Delete "${p?.name}"?`)) { products=products.filter(p=>p.id!==id); renderAdminPanel(); renderProducts(); if(currentDetailItem?.id===id) closeDetail(); } }
        function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); }

        window.addEventListener('scroll', () => { document.getElementById('goTop').classList.toggle('visible', window.scrollY>300); });
        document.getElementById('goTop').addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));
        document.getElementById('adminBtn').addEventListener('click', () => isAdminAuthenticated ? openAdminPanel() : showPasswordModal());
        document.getElementById('submitPasswordBtn').addEventListener('click', checkPasswordAndOpenAdmin);
        document.getElementById('adminPassword').addEventListener('keypress', e => { if(e.key==='Enter') checkPasswordAndOpenAdmin(); });
        window.openDetail=openDetail; window.closeDetail=closeDetail; window.nextImg=nextImg; window.prevImg=prevImg; window.setImageIndex=setImageIndex;
        window.closeAdminModal=closeAdminModal; window.editProductForm=editProductForm; window.deleteProductConfirm=deleteProductConfirm;
        window.resetAdminForm=resetAdminForm; window.cloneProduct=cloneProduct;
        initFilters(); renderProducts();
    </script>
    <style>
        /* Дополнительные стили для адаптивности и единообразия */
        .password-modal .password-box { margin: 0 1rem; width: auto; max-width: 320px; }
        .admin-modal .admin-panel { padding: 1.2rem; }
        .admin-header h2 { font-size: 1.5rem; }
        .close-admin { font-size: 24px; }
        .admin-search input { font-size: 0.9rem; }
        .admin-product-name { font-size: 0.85rem; }
        .admin-product-actions button { font-size: 0.9rem; padding: 4px; }
        .image-preview img { width: 60px; height: 60px; }
        .spec-bold { font-weight: 700; color: white; }
        .detail-buy-btn { background: white; color: black; }
        .detail-buy-btn:hover { background: #f0f0f0; }
        .back-btn { background: none; border: 1px solid rgba(255,255,255,0.3); }
        .slider-btn { display: flex; align-items: center; justify-content: center; }
        @media (max-width: 480px) {
            .admin-product-card { flex-wrap: wrap; justify-content: center; text-align: center; }
            .admin-product-info { width: 100%; text-align: center; }
            .admin-product-actions { justify-content: center; }
            .thumbnail { width: 45px; height: 45px; }
        }
    </style>
</body>
