<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluora Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #222222;
            --card-bg: #333333;
            --text-white: #ffffff;
            --accent-white: #ffffff;
            --text-dark: #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-text-size-adjust: 100%;
        }

        /* Логотип */
        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: 140px;
            margin: 20px 0 10px 0;
            text-align: center;
            font-weight: 400;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .logo:hover { opacity: 0.8; }

        /* --- ОСНОВНАЯ СТРАНИЦА --- */
        #main-view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 50px;
            padding: 0 15px;
        }

        .cat-btn {
            background-color: var(--accent-white);
            color: var(--text-dark);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px; 
            cursor: pointer;
            transition: background 0.2s;
        }
        .cat-btn:hover { background-color: #ddd; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1100px;
            width: 90%;
            padding-bottom: 50px;
        }

        /* КАРТОЧКА ТОВАРА */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
            width: 100%;
        }

        .image-container {
            width: 90%;
            aspect-ratio: 4 / 5; 
            background-color: var(--accent-white);
            border-radius: 15px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }
        .image-container img {
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.3s;
        }
        .image-container:hover img { transform: scale(1.05); }

        .info {
            text-align: center;
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            box-sizing: border-box;
        }

        .name-type {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.2;
            margin-top: 15px;
            margin-bottom: 15px;
            min-height: 38px;    
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .item-type {
            color: #aaaaaa;
            font-weight: 400;
        }

        .card-buttons {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .btn {
            font-family: 'Inter', sans-serif !important; 
            text-transform: uppercase; 
            font-weight: 800; 
            font-size: 14px;
            text-decoration: none;
            padding: 10px 0;
            border-radius: 10px; 
            display: block;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            text-align: center;
            background-color: var(--accent-white);
            color: var(--text-dark);
        }
        .btn:hover { transform: scale(1.03); }

        /* --- ДЕТАЛЬНОЕ ОКНО --- */
        #detail-view {
            display: none;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.3s ease;
        }

        .detail-card {
            background-color: #444444;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .detail-slider {
            flex: 1;
            background-color: var(--accent-white);
            border-radius: 15px;
            aspect-ratio: 3 / 4;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .detail-slider img {
            width: 100%; height: 100%;
            object-fit: cover; 
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        .slider-btn {
            background: rgba(255, 255, 255, 0.7);
            color: #000; border: none; cursor: pointer; z-index: 2;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; opacity: 0.7; transition: 0.2s;
            position: absolute; top: 50%; transform: translateY(-50%);
        }
        .slider-btn:hover { opacity: 1; transform: translateY(-50%) scale(1.1); }
        .slider-btn-prev { left: 15px; }
        .slider-btn-next { right: 15px; }

        .detail-info { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .detail-name { font-size: 32px; font-weight: 800; margin-bottom: 20px; }
        .detail-desc, .detail-specs { font-size: 14px; margin-bottom: 20px; line-height: 1.5; white-space: pre-line; }

        .detail-buy-btn {
            background-color: var(--accent-white);
            color: var(--text-dark);
            text-decoration: none; padding: 14px 0; border-radius: 10px;
            font-weight: 800; text-align: center;
            width: 100%; max-width: 300px; display: block; text-transform: uppercase;
        }

        .detail-cancel-btn {
            background: none; border: none; color: #aaa; margin-top: 15px; 
            cursor: pointer; font-weight: 700; text-transform: lowercase;
        }

        /* --- АДАПТИВНОСТЬ --- */
        @media (max-width: 900px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-card { flex-direction: column; padding: 30px; gap: 20px; }
            .detail-slider { width: 100%; max-width: 400px; }
        }

        @media (max-width: 550px) {
            .logo { font-size: 80px; }
            .product-grid { grid-template-columns: 1fr; }
            
            /* Компактный вид карточки товара для мобилок */
            #detail-view { padding: 10px; }
            .detail-card { 
                padding: 20px 15px; 
                gap: 15px; 
            }
            .detail-slider { 
                max-width: 250px; /* Фото стало заметно меньше */
                width: 90%;
            }
            .slider-btn { 
                width: 32px; height: 32px; font-size: 14px; 
            }
            .detail-name { 
                font-size: 24px; 
                margin-bottom: 10px; 
            }
            .detail-desc, .detail-specs { 
                font-size: 13px; 
                margin-bottom: 10px; 
            }
            .detail-buy-btn { 
                padding: 12px 0; 
                font-size: 14px; 
                max-width: 100%;
            }
            .detail-cancel-btn { 
                margin-top: 10px; 
                font-size: 13px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

                        "https://res.cloudinary.com/dwacujq5u/image/upload/v1773775092/A1_00045_atthku.png",
                        "https://res.cloudinary.com/dwacujq5u/image/upload/v1773775090/A1_00044_t2mgdc.png",
                        "https://res.cloudinary.com/dwacujq5u/image/upload/v1773775091/A1_00047_l3ebyy.png"], 
                description: "Longsleeve detailed with an Acne Studios 1996 stamp logo, distressed neckline, cuffs and hem", 
                specs: "- Colors: White solid, Black Solid, White with fade, Black with fade, Pink with fade, Sky Blue with fade, Green with fade, Navy Blue with fade, Wine Red with fade \n- Sizes: S-L" 
            },
            { 
                id: 26, 
                name: "Ysl Sweatshirt", 
                type: "Replica", 
                category: "hoodies", 
                images: ["https://res.cloudinary.com/dicw3zojk/image/upload/v1774104692/%D0%B7%D0%B0%D0%B3%D1%80%D1%83%D0%B7%D0%BA%D0%B0_lt02dy.jpg"], 
                description: "Navy Blue Ysl sweatshirt wit Ysl on the chest", 
                specs: "- Colors: White, Navy Blue \n- Sizes: S-2XL" 
            },
        ];

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            // СОРТИРОВКА: Вещи с большим ID будут сверху
            const sortedItems = [...items].sort((a, b) => b.id - a.id);

            sortedItems.forEach(item => {
                const coverImg = (item.images && item.images.length > 0) ? item.images[0] : null;
                grid.innerHTML += `
                    <div class="card">
                        <div class="image-container" onclick="openDetail(${item.id})">
                            ${coverImg ? `<img src="${coverImg}" alt="${item.name}">` : `<span style="color:#000">IMAGE</span>`}
                        </div>
                        <div class="info">
                            <div class="name-type">${item.name}<br><span class="item-type">${item.type}</span></div>
                            <div class="card-buttons">
                                <a href="https://t.me/bluoralv" class="btn" target="_blank">INFO</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filter(cat) {
            render(cat === 'all' ? products : products.filter(p => p.category === cat));
        }

        let currentItem = null;
        let currentImgIndex = 0;

        function openDetail(id) {
            currentItem = products.find(p => p.id === id);
            if (!currentItem) return;
            document.getElementById('detail-name').innerText = currentItem.name;
            document.getElementById('detail-desc').innerText = currentItem.description;
            document.getElementById('detail-specs').innerText = currentItem.specs;
            currentImgIndex = 0;
            updateSliderView();
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }

        function updateSliderView() {
            const imgEl = document.getElementById('detail-img');
            if (currentItem.images && currentItem.images.length > 0) {
                imgEl.src = currentItem.images[currentImgIndex];
                imgEl.style.display = 'block';
            }
        }

        function nextImg() {
            if (!currentItem.images.length) return;
            currentImgIndex = (currentImgIndex + 1) % currentItem.images.length;
            updateSliderView();
        }

        function prevImg() {
            if (!currentItem.images.length) return;
            currentImgIndex = (currentImgIndex - 1 + currentItem.images.length) % currentItem.images.length;
            updateSliderView();
        }

        render(products);
    </script>
</body>
</html>
