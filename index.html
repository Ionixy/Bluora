<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluora | Archive Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@300;400;700;900&family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #050505;
            --card-gray: #0f0f0f;
            --accent-white: #ffffff;
            --accent-offwhite: #e0e0e0;
            --text-gray: #666666;
            --glass-border: rgba(255, 255, 255, 0.08);
            --gothic-font: 'UnifrakturMaguntia', serif;
        }

        /* Эффект зернистости фона */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.03;
            pointer-events: none;
            z-index: 10;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--accent-offwhite);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* --- ЛОГОТИП --- */
        .logo-section {
            text-align: center;
            margin: 40px 0;
        }

        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(70px, 12vw, 120px);
            background: linear-gradient(to bottom, #fff 30%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            transition: all 0.5s ease;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.1));
            display: inline-block;
        }

        .logo:hover {
            letter-spacing: 5px;
            opacity: 0.8;
            transform: scale(1.02);
        }

        .logo-divider {
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #333, transparent);
            margin: 10px auto;
        }

        /* --- КАТЕГОРИИ --- */
        .categories {
            display: flex; gap: 15px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 60px;
            padding: 0 20px;
        }

        .cat-btn {
            background: none;
            color: var(--text-gray);
            border: 1px solid #222;
            padding: 8px 18px;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 700;
            border-radius: 2px;
        }

        .cat-btn:hover, .cat-btn.active {
            color: #fff;
            border-color: #fff;
            background: rgba(255,255,255,0.05);
        }

        /* --- СЕТКА ТОВАРОВ --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 40px;
            max-width: 1200px;
            width: 90%;
            padding-bottom: 100px;
        }

        /* --- КАРТОЧКА --- */
        .card {
            background-color: var(--card-gray);
            border: 1px solid #1a1a1a;
            position: relative;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex; flex-direction: column;
            animation: slideUp 0.8s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            border-color: #444;
            transform: translateY(-5px);
        }

        .image-container {
            width: 100%;
            aspect-ratio: 4 / 5;
            background-color: #fff;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: pointer;
        }

        .image-container img {
            width: 85%; height: 85%;
            object-fit: contain;
            transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .card:hover .image-container img {
            transform: scale(1.08);
        }

        .info {
            padding: 25px;
            text-align: left;
        }

        .name-type {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 1px;
            min-height: 35px;
        }

        .item-type {
            color: #555;
            font-size: 10px;
            font-weight: 400;
            display: block;
            margin-top: 4px;
        }

        .btn {
            display: block;
            border: 1px solid #333;
            color: var(--accent-offwhite);
            text-align: center;
            text-decoration: none;
            padding: 12px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 900;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: var(--accent-offwhite);
            color: #000;
            border-color: var(--accent-offwhite);
        }

        /* --- ДЕТАЛЬНОЕ ОКНО --- */
        #detail-view {
            display: none;
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
        }

        .detail-card {
            background-color: #0a0a0a;
            border: 1px solid #222;
            display: flex;
            gap: 0;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .detail-slider {
            flex: 1.2;
            background-color: #fff;
            min-height: 500px;
            display: flex; align-items: center; justify-content: center;
        }

        .detail-slider img { width: 80%; height: 80%; object-fit: contain; }

        .detail-info {
            flex: 1;
            padding: 60px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .detail-name {
            font-family: var(--gothic-font);
            font-size: 54px;
            margin: 0 0 15px 0;
            line-height: 1;
        }

        .detail-desc {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
            border-left: 2px solid #333;
            padding-left: 15px;
            line-height: 1.6;
        }

        .detail-specs {
            font-size: 13px;
            color: #555;
            margin-bottom: 40px;
            white-space: pre-line; /* Важно для переноса \n */
            line-height: 1.8;
        }

        .detail-buy-btn {
            background: var(--accent-offwhite);
            color: #000;
            text-decoration: none;
            padding: 20px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .detail-buy-btn:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        .detail-cancel-btn {
            background: none; border: none;
            color: #444;
            margin-top: 30px;
            cursor: pointer;
            text-decoration: underline;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Адаптивность */
        @media (max-width: 900px) {
            .detail-card { flex-direction: column; }
            .detail-info { padding: 40px 25px; }
            .detail-slider { min-height: 400px; }
            .product-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="logo-section">
        <div class="logo" onclick="closeDetail()">Bluora</div>
        <div class="logo-divider"></div>
    </div>

    <div id="main-view">
        <nav class="categories">
            <button class="cat-btn active" onclick="filter('all', this)">All Archive</button>
            <button class="cat-btn" onclick="filter('shirts', this)">Shirts</button>
            <button class="cat-btn" onclick="filter('pants', this)">Pants</button>
            <button class="cat-btn" onclick="filter('hoodies', this)">Hoodies</button>
            <button class="cat-btn" onclick="filter('hats', this)">Hats</button>
            <button class="cat-btn" onclick="filter('accessories', this)">Accessories</button>
        </nav>
        <main class="product-grid" id="grid"></main>
    </div>

    <div id="detail-view">
        <div class="detail-card">
            <div class="detail-slider">
                <img id="detail-img" src="" alt="">
            </div>
            <div class="detail-info">
                <h2 class="detail-name" id="detail-name">Archive Piece</h2>
                <div class="detail-desc" id="detail-desc"></div>
                <div class="detail-specs" id="detail-specs"></div>
                <a href="https://t.me/bluoralv" class="detail-buy-btn" target="_blank">Order via Telegram</a>
                <button class="detail-cancel-btn" onclick="closeDetail()">← back to collection</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                name: "Polo Ralph Lauren",
                type: "Classic Archive",
                category: "shirts",
                images: ["https://big-tall.com/cdn/shop/products/s7-1355336_lifestyle.png?v=1728922275"],
                description: "Базовая оверсайз футболка в глубоком черном цвете.",
                specs: "• 100% Heavy Cotton\n• Boxy Fit\n• Available: S / M / L"
            },
            {
                id: 2,
                name: "Acne Studio Hoodie",
                type: "Opium Style",
                category: "hoodies",
                images: ["https://www.acnestudios.com/dw/image/v2/AAXV_PRD/on/demandware.static/-/Sites-acne-product-catalog/default/dwe37b921b/images/CI/CI0136-/2000x/CI0136-900_Z.jpg?sw=1120&sh=1680"],
                description: "Массивное худи с характерным силуэтом.",
                specs: "• Washed Black\n• Distressed Edges\n• Heavyweight Fleece"
            },
            {
                id: 3,
                name: "Eternal Script Tee",
                type: "Custom Piece",
                category: "shirts",
                images: ["https://i.ibb.co/LzNfG0p/eternal.png"], 
                description: "Футболка с каллиграфическим архивным принтом.",
                specs: "• Limited Drop\n• 240 GSM\n• Screen Printed"
            },
            {
                id: 4,
                name: "Zip-Up Hoodie PRL",
                type: "Street Archive",
                category: "hoodies",
                images: ["https://img01.ztat.net/article/spp-media-p1/509f9b0f498f4db9963170b173602ad9/72a44035208a480582b153883a9d1c80.jpg?imwidth=762&filter=packshot"],
                description: "Зип-худи с премиальной фурнитурой.",
                specs: "• Grey Marl\n• Silver Hardware\n• Embroidery Logo"
            },
            {
                id: 5,
                name: "Moncler Beanie",
                type: "Cold Archive",
                category: "hats",
                images: ["https://moncler-cdn.thron.com/api/v1/content-delivery/shares/dpx6uv/contents/K20913B00074M1900999_F/image/wool-and-cashmere-beanie-men-black-moncler,-1-of-0.jpg?w=800&q=80"],
                description: "Шерстяная шапка с архивным патчем.",
                specs: "• Wool & Cashmere\n• Deep Black\n• One Size"
            }
        ];

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map((item, index) => `
                <div class="card" style="animation-delay: ${index * 0.1}s">
                    <div class="image-container" onclick="openDetail(${item.id})">
                        <img src="${item.images[0]}" alt="${item.name}">
                    </div>
                    <div class="info">
                        <div class="name-type">
                            ${item.name}
                            <span class="item-type">${item.type}</span>
                        </div>
                        <a href="https://t.me/bluoralv" class="btn" target="_blank">INFO</a>
                    </div>
                </div>
            `).join('');
        }

        function filter(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(cat === 'all' ? products : products.filter(p => p.category === cat));
        }

        function openDetail(id) {
            const item = products.find(p => p.id === id);
            if (!item) return;
            
            document.getElementById('detail-name').innerText = item.name;
            document.getElementById('detail-desc').innerText = item.description;
            document.getElementById('detail-specs').innerText = item.specs;
            document.getElementById('detail-img').src = item.images[0];
            
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }

        // Инициализация
        render(products);
    </script>
</body>
</html>
