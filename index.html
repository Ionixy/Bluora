    <script>
        (function() {
            let products = [];
            let lastCatalogScrollY = 0;

            let currentCategory = 'all', currentSearch = '', currentTopFilter = 'all', currentDetailItem = null, currentImgIndex = 0, isAdminAuthenticated = false;
            let editingProductId = null;
            let currentUser = null;
            let authMode = 'login';

            async function loadProducts() {
            const res = await fetch('/api/products');
            products = await res.json();
            renderProducts();
            }          
            
            function isProductNew(p) { return p.isNewDrop && p.newDropUntil && Date.now() < p.newDropUntil; }
            function getSortedProducts() {
                const newDrop = products.filter(p => isProductNew(p)).sort((a,b)=>b.id-a.id);
                const regular = products.filter(p => !isProductNew(p)).sort((a,b)=>b.id-a.id);
                return [...newDrop, ...regular];
            }
            function splitSpecValues(value) {
                return String(value || '').split(',').map(s => s.trim()).filter(Boolean);
            }
            function splitImageValues(value) {
                const items = [];
                let current = '';
                let dataUrlHeaderFinished = false;

                for (const char of String(value || '')) {
                    const trimmed = current.trim();
                    const isDataUrl = trimmed.startsWith('data:');

                    if (char === ',' && isDataUrl && !dataUrlHeaderFinished) {
                        current += char;
                        dataUrlHeaderFinished = true;
                        continue;
                    }

                    if (char === ',' || char === '\n') {
                        if (trimmed) items.push(trimmed);
                        current = '';
                        dataUrlHeaderFinished = false;
                        continue;
                    }

                    current += char;
                }

                if (current.trim()) items.push(current.trim());
                return items;
            }
            function loadImageSource(source) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let objectUrl = null;

                    img.onload = () => {
                        if (objectUrl) URL.revokeObjectURL(objectUrl);
                        resolve(img);
                    };
                    img.onerror = () => {
                        if (objectUrl) URL.revokeObjectURL(objectUrl);
                        reject(new Error('Could not load image'));
                    };

                    if (source instanceof Blob) {
                        objectUrl = URL.createObjectURL(source);
                        img.src = objectUrl;
                    } else {
                        img.src = source;
                    }
                });
            }
            function drawContain(ctx, img, x, y, width, height) {
                const scale = Math.min(width / img.naturalWidth, height / img.naturalHeight);
                const drawWidth = img.naturalWidth * scale;
                const drawHeight = img.naturalHeight * scale;
                const drawX = x + (width - drawWidth) / 2;
                const drawY = y + (height - drawHeight) / 2;
                ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
            }
            function getOutputSizeFromBg(bgImg) {
                const maxSide = 1100;
                const scale = Math.min(1, maxSide / Math.max(bgImg.naturalWidth, bgImg.naturalHeight));
                return {
                    width: Math.max(1, Math.round(bgImg.naturalWidth * scale)),
                    height: Math.max(1, Math.round(bgImg.naturalHeight * scale))
                };
            }
            function getAlphaBoundsFromImage(img) {
                const maxSide = 640;
                const analysisScale = Math.min(1, maxSide / Math.max(img.naturalWidth, img.naturalHeight));
                const width = Math.max(1, Math.round(img.naturalWidth * analysisScale));
                const height = Math.max(1, Math.round(img.naturalHeight * analysisScale));
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(img, 0, 0, width, height);
                const pixels = ctx.getImageData(0, 0, width, height).data;
                let minX = width, minY = height, maxX = -1, maxY = -1;

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const alpha = pixels[(y * width + x) * 4 + 3];
                        if (alpha > 10) {
                            if (x < minX) minX = x;
                            if (y < minY) minY = y;
                            if (x > maxX) maxX = x;
                            if (y > maxY) maxY = y;
                        }
                    }
                }

                if (maxX < minX || maxY < minY) {
                    return { x: 0, y: 0, width: img.naturalWidth, height: img.naturalHeight };
                }

                return {
                    x: Math.max(0, Math.floor(minX / analysisScale)),
                    y: Math.max(0, Math.floor(minY / analysisScale)),
                    width: Math.min(img.naturalWidth, Math.ceil((maxX - minX + 1) / analysisScale)),
                    height: Math.min(img.naturalHeight, Math.ceil((maxY - minY + 1) / analysisScale))
                };
            }
            function canvasToDataUrl(canvas) {
                return new Promise((resolve) => {
                    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
                    const type = isSafari ? 'image/jpeg' : 'image/webp';
                    const quality = isSafari ? 0.88 : 0.82;

                    if (!canvas.toBlob) {
                        resolve(canvas.toDataURL(type, quality));
                        return;
                    }

                    canvas.toBlob((blob) => {
                        if (!blob) {
                            resolve(canvas.toDataURL(type, quality));
                            return;
                        }

                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(blob);
                    }, type, quality);
                });
            }
            function waitForNextFrame() {
                return new Promise(resolve => requestAnimationFrame(resolve));
            }
            async function composeProductOnBluoraBg(productBlob) {
                const [bgImg, productImg] = await Promise.all([
                    loadImageSource('/bg.png'),
                    loadImageSource(productBlob)
                ]);

                const outputSize = getOutputSizeFromBg(bgImg);
                const canvas = document.createElement('canvas');
                canvas.width = outputSize.width;
                canvas.height = outputSize.height;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#d7d9d8';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawContain(ctx, bgImg, 0, 0, canvas.width, canvas.height);

                const bounds = getAlphaBoundsFromImage(productImg);
                const maxWidth = canvas.width * 0.74;
                const maxHeight = canvas.height * 0.56;
                const scale = Math.min(maxWidth / bounds.width, maxHeight / bounds.height);
                const drawWidth = bounds.width * scale;
                const drawHeight = bounds.height * scale;
                const drawX = (canvas.width - drawWidth) / 2;
                const drawY = (canvas.height * 0.47) - (drawHeight / 2);

                ctx.drawImage(
                    productImg,
                    bounds.x,
                    bounds.y,
                    bounds.width,
                    bounds.height,
                    drawX,
                    drawY,
                    drawWidth,
                    drawHeight
                );

                return await canvasToDataUrl(canvas);
            }
            function readSpecLine(specs, label) {
                const line = String(specs || '').split('\n').find(item => item.toLowerCase().includes(label.toLowerCase()));
                return line ? line.replace(/^-\s*[^:]+:\s*/i, '').trim() : '';
            }
            function getProductColors(p) {
                return splitSpecValues(p?.colors || p?.color || readSpecLine(p?.specs, 'color'));
            }
            function getProductSizes(p) {
                return splitSpecValues(p?.sizes || p?.size || readSpecLine(p?.specs, 'size'));
            }
            function renderPills(values, emptyText) {
                return values.length ? values.map(value => `<span class="detail-pill">${value}</span>`).join('') : `<span class="detail-pill">${emptyText}</span>`;
            }
            function buildSpecs(colors, sizes) {
                const parts = [];
                if (colors.trim()) parts.push(`- Colors : ${colors.trim()}`);
                if (sizes.trim()) parts.push(`- Sizes : ${sizes.trim()}`);
                return parts.join('\n') || '- Colors : ...\n- Sizes : ...';
            }
            function getAdminHeaders() {
                return { 'Content-Type': 'application/json' };
            }
            function renderProducts() {
                let filtered = getSortedProducts().filter(p => {
                    if (currentSearch && !p.name.toLowerCase().includes(currentSearch.toLowerCase())) return false;
                    if (currentCategory !== 'all' && p.category !== currentCategory) return false;
                    if (currentTopFilter === 'new' && !isProductNew(p)) return false;
                    return true;
                });
                document.getElementById('productCounter').innerText = `📦 ${filtered.length} product${filtered.length !== 1 ? 's' : ''} found`;
                const grid = document.getElementById('grid');
                if (!filtered.length) { grid.innerHTML = '<div style="text-align:center; grid-column:1/-1; padding:40px;">No products found</div>'; return; }
                grid.innerHTML = filtered.map(p => `<div class="card"><div class="image-container" data-id="${p.id}">${isProductNew(p) ? '<span class="new-badge">NEW DROP</span>' : ''}<img src="${p.images[0]}" loading="lazy"></div><div class="info"><div class="name-type">${p.name}<span class="item-type">${p.type}</span></div><button class="btn-buy" data-id="${p.id}">DETAILS</button></div></div>`).join('');
                document.querySelectorAll('.image-container[data-id]').forEach(el => { el.addEventListener('click', (e) => { e.stopPropagation(); openDetail(parseInt(el.dataset.id)); }); });
                document.querySelectorAll('.btn-buy[data-id]').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); openDetail(parseInt(btn.dataset.id)); }); });
            }
            function openDetail(id) {
                const p = products.find(p=>p.id===id);
                if(!p) return;
                currentDetailItem = p;
                currentImgIndex = 0;
                lastCatalogScrollY = window.scrollY;
                document.getElementById('main-view').style.display = 'none';
                document.getElementById('detail-view').style.display = 'block';
                document.getElementById('detail-name').innerText = p.name;
                document.getElementById('detail-desc').innerHTML = p.description;
                document.getElementById('detail-colors').innerHTML = renderPills(getProductColors(p), 'No colors');
                document.getElementById('detail-sizes').innerHTML = renderPills(getProductSizes(p), 'No sizes');
                const hasMultiple = p.images.length > 1;
                document.getElementById('prevBtn').style.display = hasMultiple ? 'flex' : 'none';
                document.getElementById('nextBtn').style.display = hasMultiple ? 'flex' : 'none';
                updateDetailImage();
                renderThumbnails();
            }
            function updateDetailImage() {
                const img = document.getElementById('detail-img');
                if(currentDetailItem?.images.length) {
                    img.src = currentDetailItem.images[currentImgIndex % currentDetailItem.images.length];
                }
                document.querySelectorAll('.thumbnail').forEach((thumb, idx) => {
                    if(idx === currentImgIndex) thumb.classList.add('active');
                    else thumb.classList.remove('active');
                });
            }
            function renderThumbnails() {
                const strip = document.getElementById('thumbnailStrip');
                if(!currentDetailItem) return;
                if(currentDetailItem.images.length <= 1) {
                    strip.innerHTML = '';
                    return;
                }
                strip.innerHTML = currentDetailItem.images.map((img, idx) => `<img class="thumbnail ${idx === currentImgIndex ? 'active' : ''}" src="${img}" data-index="${idx}">`).join('');
                document.querySelectorAll('.thumbnail').forEach(thumb => { thumb.addEventListener('click', () => setImageIndex(parseInt(thumb.dataset.index))); });
            }
            function setImageIndex(idx) { currentImgIndex = idx; updateDetailImage(); }
            function nextImg() { if(currentDetailItem?.images.length > 1) { currentImgIndex = (currentImgIndex + 1) % currentDetailItem.images.length; updateDetailImage(); } }
            function prevImg() { if(currentDetailItem?.images.length > 1) { currentImgIndex = (currentImgIndex - 1 + currentDetailItem.images.length) % currentDetailItem.images.length; updateDetailImage(); } }
            function closeDetail() {
                document.getElementById('main-view').style.display = 'block';
                document.getElementById('detail-view').style.display = 'none';
                renderProducts();
                requestAnimationFrame(() => window.scrollTo({ top: lastCatalogScrollY, behavior: 'auto' }));
            }
            
            function initFilters() {
                document.getElementById('searchInput').addEventListener('input', e=>{ currentSearch=e.target.value; renderProducts(); });
                document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentTopFilter=btn.dataset.filter; renderProducts(); }));
                document.querySelectorAll('.cat-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentCategory=btn.dataset.cat; renderProducts(); }));
            }

            function setAuthMode(mode) {
                authMode = mode;
                document.getElementById('authTitle').innerText = mode === 'login' ? 'Login' : 'Create account';
                document.getElementById('submitPasswordBtn').innerText = mode === 'login' ? 'Login' : 'Register';
                document.getElementById('switchAuthModeBtn').innerText = mode === 'login' ? 'Register' : 'Login';
                document.getElementById('authUsername').style.display = mode === 'register' ? 'block' : 'none';
                document.getElementById('passwordError').innerText = '';
            }
            function showPasswordModal(mode = 'register') {
                setAuthMode(mode);
                document.getElementById('passwordModal').classList.add('active');
                document.getElementById('authEmail').focus();
            }
            async function syncAuthState() {
                try {
                    const res = await fetch('/api/auth/me');
                    const data = await res.json();
                    currentUser = data.user || null;
                    isAdminAuthenticated = currentUser?.role === 'admin';
                    document.getElementById('profileName').innerText = currentUser?.username || 'Account';
                    const adminButton = document.getElementById('adminBtn');
                    adminButton.style.display = isAdminAuthenticated ? 'block' : 'none';
                    if (isAdminAuthenticated) adminButton.innerHTML = '<i class="fas fa-user-shield"></i> Admin';
                } catch (error) {
                    currentUser = null;
                    isAdminAuthenticated = false;
                    document.getElementById('profileName').innerText = 'Account';
                    document.getElementById('adminBtn').style.display = 'none';
                }
            }
            async function submitAuthForm() {
                const username = document.getElementById('authUsername').value.trim();
                const email = document.getElementById('authEmail').value.trim();
                const password = document.getElementById('authPassword').value;
                const errorBox = document.getElementById('passwordError');
                errorBox.innerText = '';

                const isRegistering = authMode === 'register';
                const res = await fetch(`/api/auth/${isRegistering ? 'register' : 'login'}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                let data;
                try {
                    data = await res.json();
                } catch {
                    errorBox.innerText = 'The server returned an unexpected response. Please try again.';
                    return;
                }

                if (!res.ok) {
                    errorBox.innerText = data.error || 'Could not authenticate.';
                    return;
                }

                currentUser = data.user;
                isAdminAuthenticated = currentUser?.role === 'admin';
                document.getElementById('passwordModal').classList.remove('active');
                await syncAuthState();

                if (isAdminAuthenticated) openAdminPanel();
                else if (isRegistering) alert('Account created successfully.');
            }
            async function logout() {
                await fetch('/api/auth/logout', { method: 'POST' });
                currentUser = null;
                isAdminAuthenticated = false;
                closeAdminModal();
                await syncAuthState();
            }
            async function openProfile() {
                if (!currentUser) {
                    showPasswordModal('register');
                    return;
                }
                if (confirm(`Log out of ${currentUser.username}?`)) await logout();
            }
            function openAdminPanel() { if(!isAdminAuthenticated) { showPasswordModal(); return; } editingProductId=null; renderAdminPanel(); document.getElementById('adminModal').classList.add('active'); }
            
            function renderAdminPanel() { 
                const container = document.getElementById('adminPanelContent');
                const sorted = getSortedProducts();
                container.innerHTML = `<div class="admin-header"><h2><i class="fas fa-tools"></i> Admin Dashboard</h2><div style="display:flex; gap:10px; align-items:center;"><span style="font-size:13px; opacity:.75;">${currentUser?.email || ''}</span><button class="btn-secondary" id="logoutBtn" type="button">Logout</button><button class="close-admin" id="closeAdminBtn">&times;</button></div></div><div style="margin-bottom:20px;"><h3>Admin Users</h3><div class="admin-products-grid" id="adminUsersGrid" style="max-height:220px;"></div></div><div class="admin-search"><input type="text" id="adminSearchInput" placeholder="🔍 Search products in admin..."></div><div style="margin-bottom:20px;"><h3>Products List</h3><div class="admin-products-grid" id="adminProductsGrid"></div></div><div class="admin-form" id="adminForm"><h3 style="margin-top:0; margin-bottom:1.5rem;" id="formTitle">➕ Add New Product</h3><div class="form-row"><input type="text" id="prodName" placeholder="Product Name"><select id="prodCategory"><option value="shirts">SHIRTS</option><option value="pants">PANTS</option><option value="hoodies">HOODIES</option><option value="hats">HATS</option><option value="shoes">SHOES</option><option value="accessories">ACCESSORIES</option></select></div><div class="form-row"><input type="text" id="prodImages" placeholder="Image URLs (comma separated)"><input type="text" id="prodColors" placeholder="Colors (comma separated)"></div><div style="margin-bottom: 15px;"><button type="button" id="magicBgBtn" style="width: 100%; background: linear-gradient(135deg, #b48b54, #8a6534); color: white; border: none; padding: 12px; border-radius: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;">✨ Сделать фирменный фон Bluora</button></div><div class="form-row"><input type="text" id="prodSizes" placeholder="Sizes (comma separated)"><div></div></div><div id="imagePreviewContainer" class="image-preview"></div><textarea id="prodDesc" placeholder="Description"></textarea><label class="checkbox-label"><input type="checkbox" id="prodIsNew"> <span>🔥 Mark as New Drop</span></label><div class="form-actions" style="display:flex; gap:15px; justify-content:flex-end; margin-top:20px;"><button class="btn-secondary" id="cancelAdminFormBtn">Cancel</button><button class="btn-primary" id="saveProductBtn">Save Product</button></div></div>`;
                document.getElementById('closeAdminBtn').addEventListener('click', closeAdminModal);
                document.getElementById('logoutBtn').addEventListener('click', logout);
                document.getElementById('cancelAdminFormBtn').addEventListener('click', resetAdminForm);
                const renderAdminList = () => {
                    const searchVal = document.getElementById('adminSearchInput')?.value.toLowerCase() || '';
                    const filtered = sorted.filter(p => p.name.toLowerCase().includes(searchVal));
                    const gridDiv = document.getElementById('adminProductsGrid');
                    gridDiv.innerHTML = filtered.map(p => `<div class="admin-product-card"><img class="admin-product-img" src="${p.images[0]}"><div class="admin-product-info"><div class="admin-product-name">${p.name}</div><div class="admin-product-cat">${p.category}</div></div><div class="admin-product-actions"><button class="edit-btn" data-id="${p.id}" title="Edit"><i class="fas fa-edit"></i></button><button class="clone-btn" data-id="${p.id}" title="Clone"><i class="fas fa-copy"></i></button><button class="delete-btn" data-id="${p.id}" title="Delete"><i class="fas fa-trash-alt"></i></button></div></div>`).join('');
                    document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => editProductForm(parseInt(btn.dataset.id))));
                    document.querySelectorAll('.clone-btn').forEach(btn => btn.addEventListener('click', () => cloneProduct(parseInt(btn.dataset.id))));
                    document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => deleteProductConfirm(parseInt(btn.dataset.id))));
                };
                const renderAdminUsers = async () => {
                    const usersGrid = document.getElementById('adminUsersGrid');
                    usersGrid.innerHTML = '<div style="opacity:.7; padding:10px;">Loading users...</div>';
                    const res = await fetch('/api/admin/users');
                    if (!res.ok) {
                        usersGrid.innerHTML = '<div style="opacity:.7; padding:10px;">Could not load users.</div>';
                        return;
                    }

                    const data = await res.json();
                    usersGrid.innerHTML = data.users.map(user => {
                        const nextRole = user.role === 'admin' ? 'user' : 'admin';
                        const label = user.role === 'admin' ? 'Make user' : 'Make admin';
                        const removeAction = currentUser?.isPrimaryAdmin && Number(user.id) !== Number(currentUser.id)
                            ? `<button class="delete-btn delete-user-btn" data-id="${user.id}" title="Delete account"><i class="fas fa-user-minus"></i></button>`
                            : '';
                        return `<div class="admin-product-card"><div class="admin-product-info"><div class="admin-product-name">${user.username || user.email}</div><div class="admin-product-cat">${user.role} · ${user.email}</div></div><div class="admin-product-actions"><button class="clone-btn user-role-btn" data-id="${user.id}" data-role="${nextRole}" title="${label}">${label}</button>${removeAction}</div></div>`;
                    }).join('') || '<div style="opacity:.7; padding:10px;">No users yet.</div>';

                    document.querySelectorAll('.user-role-btn').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const res = await fetch(`/api/admin/users/${btn.dataset.id}`, {
                                method: 'PATCH',
                                headers: getAdminHeaders(),
                                body: JSON.stringify({ role: btn.dataset.role })
                            });
                            if (!res.ok) {
                                alert('Could not update user role.');
                                return;
                            }
                            await renderAdminUsers();
                        });
                    });
                    document.querySelectorAll('.delete-user-btn').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            if (!confirm('Delete this account? The person will need to register again.')) return;
                            const res = await fetch(`/api/admin/users/${btn.dataset.id}`, { method: 'DELETE' });
                            const data = await res.json();
                            if (!res.ok) {
                                alert(data.error || 'Could not delete user.');
                                return;
                            }
                            await renderAdminUsers();
                        });
                    });
                };
                
                setTimeout(() => { 
                    const searchInput = document.getElementById('adminSearchInput'); 
                    if(searchInput) searchInput.addEventListener('input', renderAdminList); 
                    renderAdminList(); 
                    renderAdminUsers();
                    
                    document.getElementById('magicBgBtn').onclick = async () => {
                        const imagesInput = document.getElementById('prodImages');
                        const urls = splitImageValues(imagesInput.value);
                        
                        if (!urls.length) {
                            alert('Пожалуйста, сначала вставьте хотя бы одну ссылку на исходное фото товара в поле Image URLs!');
                            return;
                        }

                        const btn = document.getElementById('magicBgBtn');
                        const originalText = btn.innerText;
                        btn.innerText = '⏳ Магия Bluora в процессе... Обрабатываем фото...';
                        btn.disabled = true;

                        const processedUrls = [];

                        for (let i = 0; i < urls.length; i++) {
                            const url = urls[i];
                            btn.innerText = `⏳ Обрабатываем фото ${i + 1}/${urls.length}...`;
                            await waitForNextFrame();

                            if (url.startsWith('data:')) {
                                processedUrls.push(url);
                                continue;
                            }

                            try {
                                const response = await fetch('/api/remove-bg', {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json'
                                    },
                                    body: JSON.stringify({ imageUrl: url })
                                });

                                if (!response.ok) {
                                    const errData = await response.json();
                                    throw new Error(errData.error || 'Ошибка сервера');
                                }

                                const blob = await response.blob();
                                const dataUrl = await composeProductOnBluoraBg(blob);

                                processedUrls.push(dataUrl);
                            } catch (error) {
                                alert(`Не удалось обработать картинку ${url}: ${error.message}`);
                                processedUrls.push(url); 
                            }
                        }

                        imagesInput.value = processedUrls.join(', ');
                        imagesInput.dispatchEvent(new Event('input'));
                        
                        btn.innerText = '✅ Все фото успешно перенесены на фирменный фон!';
                        btn.style.background = '#4caf50';
                        btn.disabled = false;
                        
                        setTimeout(() => {
                            btn.innerText = originalText;
                            btn.style.background = 'linear-gradient(135deg, #b48b54, #8a6534)';
                        }, 4000);
                    };

                    document.getElementById('saveProductBtn').onclick = () => saveProduct(); 
                    attachImagePreview(); 
                }, 10);
            }
            
            function attachImagePreview() { const imagesInput = document.getElementById('prodImages'); const previewDiv = document.getElementById('imagePreviewContainer'); const updatePreview = () => { let urls = splitImageValues(imagesInput.value); previewDiv.innerHTML = urls.map(url => `<img src="${url}" onerror="this.style.opacity='0.3'">`).join(''); }; imagesInput.addEventListener('input', updatePreview); updatePreview(); }
            function resetAdminForm() { editingProductId=null; document.getElementById('formTitle').innerText='➕ Add New Product'; document.getElementById('prodName').value=''; document.getElementById('prodCategory').value='shirts'; document.getElementById('prodImages').value=''; document.getElementById('prodColors').value=''; document.getElementById('prodSizes').value=''; document.getElementById('prodDesc').value=''; document.getElementById('prodIsNew').checked=false; attachImagePreview(); }
            function editProductForm(id) { const p=products.find(p=>p.id===id); if(!p) return; editingProductId=id; document.getElementById('formTitle').innerText='✏️ Edit Product'; document.getElementById('prodName').value=p.name; document.getElementById('prodCategory').value=p.category; document.getElementById('prodImages').value=p.images.join(', '); document.getElementById('prodColors').value=getProductColors(p).join(', '); document.getElementById('prodSizes').value=getProductSizes(p).join(', '); document.getElementById('prodDesc').value=p.description; document.getElementById('prodIsNew').checked=p.isNewDrop; attachImagePreview(); document.getElementById('adminForm').scrollIntoView({behavior:'smooth'}); }
            function cloneProduct(id) { const original=products.find(p=>p.id===id); if(!original) return; const newId=Math.max(...products.map(p=>p.id),0)+1; const clone={...original, id:newId, name:original.name+' (copy)', isNewDrop:false, newDropUntil:null}; products.push(clone); renderAdminPanel(); renderProducts(); }
            async function saveProduct() {
              const product = {
                name: document.getElementById('prodName').value.trim(),
                type: 'Replica',
                category: document.getElementById('prodCategory').value,
                images: splitImageValues(document.getElementById('prodImages').value),
                colors: document.getElementById('prodColors').value.trim(),
                sizes: document.getElementById('prodSizes').value.trim(),
                specs: buildSpecs(document.getElementById('prodColors').value, document.getElementById('prodSizes').value),
                description: document.getElementById('prodDesc').value.trim() || 'No description',
                isNewDrop: document.getElementById('prodIsNew').checked,
                newDropUntil: document.getElementById('prodIsNew').checked
                  ? Date.now() + 7 * 24 * 60 * 60 * 1000
                  : null
              };

              if (!product.name) {
                alert('Name required');
                return;
              }

              if (!product.images.length) {
                product.images = ['https://picsum.photos/id/1/400/500'];
              }

              const res = editingProductId !== null
                ? await fetch(`/api/products/${editingProductId}`, {
                    method: 'PUT',
                    headers: getAdminHeaders(),
                    body: JSON.stringify(product)
                  })
                : await fetch('/api/products', {
                    method: 'POST',
                    headers: getAdminHeaders(),
                    body: JSON.stringify(product)
                  });

              if (!res.ok) {
                alert('Could not save product. Please try again.');
                return;
              }

              await loadProducts();
              renderAdminPanel();
              resetAdminForm();

              if (currentDetailItem && !products.find(p => p.id === currentDetailItem.id)) {
                closeDetail();
              }
            }
            async function deleteProductConfirm(id) {
              if (!confirm('Delete this product?')) return;

              const res = await fetch(`/api/products/${id}`, {
                method: 'DELETE',
                headers: getAdminHeaders()
              });
              if (!res.ok) {
                alert('Could not delete product. Please try again.');
                return;
              }

              await loadProducts();
              renderAdminPanel();

              if (currentDetailItem && currentDetailItem.id === id) {
                closeDetail();
              }
            }
            function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); }
            
            window.openDetail = openDetail; window.closeDetail = closeDetail; window.nextImg = nextImg; window.prevImg = prevImg; window.setImageIndex = setImageIndex; window.closeAdminModal = closeAdminModal; window.editProductForm = editProductForm; window.deleteProductConfirm = deleteProductConfirm; window.resetAdminForm = resetAdminForm; window.cloneProduct = cloneProduct;
            
            document.getElementById('logoHome').addEventListener('click', closeDetail);
            document.getElementById('detailBackBtn').addEventListener('click', closeDetail);
            document.getElementById('prevBtn').addEventListener('click', prevImg);
            document.getElementById('nextBtn').addEventListener('click', nextImg);
            document.getElementById('adminBtn').addEventListener('click', () => isAdminAuthenticated ? openAdminPanel() : showPasswordModal());
            document.getElementById('profileBtn').addEventListener('click', openProfile);
            document.getElementById('closeAuthBtn').addEventListener('click', () => document.getElementById('passwordModal').classList.remove('active'));
            document.getElementById('submitPasswordBtn').addEventListener('click', submitAuthForm);
            document.getElementById('switchAuthModeBtn').addEventListener('click', () => setAuthMode(authMode === 'login' ? 'register' : 'login'));
            document.getElementById('authPassword').addEventListener('keypress', e => { if(e.key==='Enter') submitAuthForm(); });
            window.addEventListener('scroll', () => { document.getElementById('goTop').classList.toggle('visible', window.scrollY>300); });
            document.getElementById('goTop').addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));
            initFilters();
            syncAuthState();
            loadProducts();
        })();
    </script>
