<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluora Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Pinyon+Script&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030303; /* Глубокий черный */
            --card-border: #222222; /* Тонкие рамки вместо сплошного фона */
            --text-main: #e0e0e0;
            --text-accent: #ffffff;
            --text-muted: #777777;
            --font-display: 'Cormorant Garamond', serif;
            --font-ui: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-ui);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-text-size-adjust: 100%;
            /* Легкий шум на фоне для винтажности */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        }

        /* Логотип */
        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: 130px;
            margin: 30px 0 10px 0;
            text-align: center;
            color: var(--text-accent);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: opacity 0.3s, text-shadow 0.3s;
            line-height: 1;
        }
        .logo:hover { 
            opacity: 0.8; 
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        /* --- ОСНОВНАЯ СТРАНИЦА --- */
        #main-view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .categories {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 60px;
            padding: 0 15px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 20px;
            width: 80%;
            max-width: 800px;
        }

        .cat-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: none;
            padding: 5px 10px;
            font-family: var(--font-ui);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 11px; 
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            position: relative;
        }
        .cat-btn::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background-color: var(--text-accent);
            transition: width 0.3s ease;
        }
        .cat-btn:hover, .cat-btn.active { 
            color: var(--text-accent); 
        }
        .cat-btn:hover::after, .cat-btn.active::after {
            width: 100%;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 1200px;
            width: 90%;
            padding-bottom: 80px;
        }

        /* КАРТОЧКА ТОВАРА */
        .card {
            background-color: transparent;
            border: 1px solid var(--card-border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 25px;
            width: 100%;
            transition: border-color 0.4s;
        }
        .card:hover {
            border-color: #555;
        }

        .image-container {
            width: 100%;
            aspect-ratio: 4 / 5; 
            background-color: #0a0a0a;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .image-container img {
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.6s;
            filter: grayscale(20%) contrast(110%);
        }
        .image-container:hover img { 
            transform: scale(1.08); 
            filter: grayscale(0%) contrast(100%);
        }

        .info {
            text-align: center;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .name-type {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 400;
            line-height: 1.3;
            margin-top: 20px;
            margin-bottom: 20px;
            min-height: 45px;  
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .item-type {
            font-family: var(--font-ui);
            color: var(--text-muted);
            font-weight: 300;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* КНОПКА-ССЫЛКА В ТГ */
        .card-buttons {
            display: flex;
            justify-content: center;
            width: 90%;
        }
        .btn {
            font-family: var(--font-ui);
            text-transform: uppercase; 
            font-weight: 300; 
            letter-spacing: 2px;
            font-size: 11px;
            text-decoration: none;
            padding: 12px 0;
            border: 1px solid var(--card-border);
            display: block;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            text-align: center;
            background-color: transparent;
            color: var(--text-main);
        }
        .btn:hover { 
            background-color: var(--text-accent);
            color: #000;
            border-color: var(--text-accent);
        }

        /* --- ДЕТАЛЬНОЕ ОКНО --- */
        #detail-view {
            display: none;
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            box-sizing: border-box;
            animation: fadeIn 0.5s ease;
        }

        .detail-card {
            background-color: transparent;
            border: 1px solid var(--card-border);
            padding: 0;
            display: flex;
            align-items: stretch;
        }

        .detail-slider {
            flex: 1.2;
            background-color: #0a0a0a;
            border-right: 1px solid var(--card-border);
            aspect-ratio: 3 / 4;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .detail-slider img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        .slider-btn {
            background: rgba(0, 0, 0, 0.5);
            color: #fff; border: 1px solid rgba(255,255,255,0.2); 
            cursor: pointer; z-index: 2;
            width: 45px; height: 45px; 
            border-radius: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; opacity: 0.5; transition: all 0.3s;
            position: absolute; top: 50%; transform: translateY(-50%);
            backdrop-filter: blur(4px);
        }
        .slider-btn:hover { opacity: 1; border-color: #fff; }
        .slider-btn-prev { left: 15px; }
        .slider-btn-next { right: 15px; }

        .detail-info { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            text-align: center; 
            padding: 50px 30px;
        }
        
        .detail-name { 
            font-family: var(--font-display);
            font-size: 38px; 
            font-weight: 400; 
            margin-bottom: 25px; 
            line-height: 1.1;
        }
        
        .detail-desc, .detail-specs { 
            font-size: 13px; 
            font-weight: 300;
            color: #aaa;
            margin-bottom: 25px; 
            line-height: 1.6; 
            letter-spacing: 0.5px;
        }

        .detail-buy-btn {
            background-color: var(--text-accent);
            color: #000;
            text-decoration: none; padding: 15px 0; 
            font-family: var(--font-ui);
            font-size: 12px;
            letter-spacing: 2px;
            font-weight: 600; text-align: center;
            width: 100%; max-width: 280px; display: block; text-transform: uppercase;
            transition: background 0.3s, color 0.3s;
        }
        .detail-buy-btn:hover {
            background-color: #ccc;
        }

        .detail-cancel-btn {
            background: none; border: none; color: var(--text-muted); 
            margin-top: 25px; 
            cursor: pointer; font-family: var(--font-display); 
            font-style: italic; font-size: 16px;
            transition: color 0.3s;
        }
        .detail-cancel-btn:hover {
            color: var(--text-accent);
        }

        /* --- АДАПТИВНОСТЬ --- */
        @media (max-width: 900px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-card { flex-direction: column; border: none; }
            .detail-slider { border-right: none; border-bottom: 1px solid var(--card-border); }
            .detail-info { padding: 40px 15px; border: 1px solid var(--card-border); border-top: none; }
        }

        @media (max-width: 550px) {
            .logo { font-size: 90px; }
            .product-grid { grid-template-columns: 1fr; }
            .categories { width: 100%; padding: 0 5px 15px 5px; gap: 10px; }
            .cat-btn { font-size: 10px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }
    </style>
</head>
<body>

    <div class="logo" onclick="closeDetail()">Bluora</div>

    <div id="main-view">
        <nav class="categories">
            <button class="cat-btn" onclick="filter('all')">ALL</button>
            <button class="cat-btn" onclick="filter('shirts')">SHIRTS</button>
            <button class="cat-btn" onclick="filter('pants')">PANTS</button>
            <button class="cat-btn" onclick="filter('hoodies')">HOODIES</button>
            <button class="cat-btn" onclick="filter('hats')">HATS</button>
            <button class="cat-btn" onclick="filter('shoes')">SHOES</button>
            <button class="cat-btn" onclick="filter('accessories')">ACCESSORIES</button>
        </nav>
        <main class="product-grid" id="grid"></main>
    </div>

    <div id="detail-view">
        <div class="detail-card">
            <div class="detail-slider">
                <button class="slider-btn slider-btn-prev" onclick="prevImg()">&#10094;</button>
                <img id="detail-img" src="" alt="" style="display: none;">
                <button class="slider-btn slider-btn-next" onclick="nextImg()">&#10095;</button>
            </div>
            <div class="detail-info">
                <h2 class="detail-name" id="detail-name">Clothes Name</h2>
                <div class="detail-desc" id="detail-desc"></div>
                <div class="detail-specs" id="detail-specs"></div>
                <a href="https://t.me/bluoralv" class="detail-buy-btn" target="_blank">Inquire</a>
                <button class="detail-cancel-btn" onclick="closeDetail()">return</button>
            </div>
        </div>
    </div>

    <script>
        // JS остался полностью без изменений
        const products = [
            { 
                id: 1, 
                name: "Polo Ralph Lauren", 
                type: "Replica", 
                category: "shirts", 
                images: ["https://big-tall.com/cdn/shop/products/s7-1355336_lifestyle.png?v=1728922275"], 
                description: "Базовая оверсайз футболка.", 
                specs: "- цвета: черный\n- размеры: S, M, L" 
            },
            { 
                id: 2, 
                name: "Acne Studio Hoodie", 
                type: "Replica", 
                category: "hoodies", 
                images: ["https://www.acnestudios.com/dw/image/v2/AAXV_PRD/on/demandware.static/-/Sites-acne-product-catalog/default/dwe37b921b/images/CI/CI0136-/2000x/CI0136-900_Z.jpg?sw=1120&sh=1680"], 
                description: "Бомбовая худи Акне Студио", 
                specs: "- цвета: черный" 
            },
            { 
                id: 3, 
                name: "Diesel Jeans", 
                type: "Replica", 
                category: "pants", 
                images: ["https://images.clothes.com/example-jeans.jpg"], 
                description: "Классические джинсы Diesel.", 
                specs: "- Denim\n- Slim Fit" 
            },            
            { 
                id: 4, 
                name: "Zip-Up Hoodie PRL", 
                type: "Replica", 
                category: "hoodies", 
                images: ["https://img01.ztat.net/article/spp-media-p1/509f9b0f498f4db9963170b173602ad9/72a44035208a480582b153883a9d1c80.jpg?imwidth=762&filter=packshot"], 
                description: "Grey Zip-Up hoodie", 
                specs: "- цвета: GREY\n- размеры: S, M, L" 
            }, 
            { 
                id: 5, 
                name: "Moncler Hat", 
                type: "Replica", 
                category: "hats", 
                images: ["https://moncler-cdn.thron.com/api/v1/content-delivery/shares/dpx6uv/contents/K20913B00074M1900999_F/image/wool-and-cashmere-beanie-men-black-moncler,-1-of-0.jpg?w=800&q=80"], 
                description: "Black Hat", 
                specs: "- цвета: Black" 
            },
            { 
                id: 6, 
                name: "Nike Dunk Low", 
                type: "Replica", 
                category: "shoes", 
                images: ["https://images.shoes.com/example-shoes.jpg"], 
                description: "Стильные кроссовки на каждый день.", 
                specs: "- Размеры: 40-45" 
            },
            { 
                id: 7, 
                name: "Leather Belt", 
                type: "Replica", 
                category: "accessories", 
                images: ["https://images.accs.com/example-belt.jpg"], 
                description: "Кожаный ремень с металлической пряжкой.", 
                specs: "- Материал: 100% Кожа" 
            }
        ];

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; 
            items.forEach(item => {
                const coverImg = (item.images && item.images.length > 0) ? item.images[0] : null;
                grid.innerHTML += `
                    <div class="card">
                        <div class="image-container" onclick="openDetail(${item.id})">
                            ${coverImg ? `<img src="${coverImg}" alt="${item.name}">` : `<span style="color:#555">IMAGE</span>`}
                        </div>
                        <div class="info">
                            <div class="name-type">${item.name}<br><span class="item-type">${item.type}</span></div>
                            <div class="card-buttons">
                                <a href="https://t.me/bluoralv" class="btn" target="_blank">INFO</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filter(cat) {
            render(cat === 'all' ? products : products.filter(p => p.category === cat));
        }

        let currentItem = null;
        let currentImgIndex = 0;

        function openDetail(id) {
            currentItem = products.find(p => p.id === id);
            if (!currentItem) return;
            document.getElementById('detail-name').innerText = currentItem.name;
            document.getElementById('detail-desc').innerText = currentItem.description;
            document.getElementById('detail-specs').innerText = currentItem.specs;
            currentImgIndex = 0;
            updateSliderView();
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }

        function updateSliderView() {
            const imgEl = document.getElementById('detail-img');
            if (currentItem.images && currentItem.images.length > 0) {
                imgEl.src = currentItem.images[currentImgIndex];
                imgEl.style.display = 'block';
            }
        }

        function nextImg() {
            if (!currentItem.images.length) return;
            currentImgIndex = (currentImgIndex + 1) % currentItem.images.length;
            updateSliderView();
        }

        function prevImg() {
            if (!currentItem.images.length) return;
            currentImgIndex = (currentImgIndex - 1 + currentItem.images.length) % currentItem.images.length;
            updateSliderView();
        }

        render(products);
    </script>
</body>
</html>
