<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluora Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #242424;
            --card-border: #333333;
            --text-white: #ffffff;
            --accent-white: #ffffff;
            --text-dark: #000000;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: 100px;
            margin: 20px 0 20px 0;
            text-align: center;
            font-weight: 400;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
            cursor: pointer;
        }

        #main-view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
            padding: 0 15px;
        }

        .cat-btn {
            background-color: var(--accent-white);
            color: var(--text-dark);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 14px; 
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .cat-btn:hover { opacity: 0.8; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1100px;
            width: 90%;
            padding-bottom: 50px;
        }

        /* КАРТОЧКА ТОВАРА */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%; /* Чтобы все карточки в ряду были одной высоты */
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }

        .image-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--card-bg); /* ИСПРАВЛЕНО: убрали белый фон */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block; /* Убирает возможные микро-отступы снизу */
        }

        .info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1; /* Заставляет блок инфо занимать всё свободное место */
        }

        .name-type {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px;
            flex-grow: 1; /* Выталкивает кнопку вниз */
        }

        .item-name {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-white);
            /* Убрали жесткий nowrap, чтобы длинные названия не ломали верстку, 
               но если нужно в одну строку — оставляем ellipsis */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-type {
            color: var(--text-gray);
            font-weight: 500;
            font-size: 13px;
        }

        .btn {
            font-family: 'Inter', sans-serif !important; 
            text-transform: uppercase; 
            font-weight: 800; 
            font-size: 13px;
            text-decoration: none;
            padding: 12px 0;
            border-radius: 8px; 
            display: block;
            text-align: center;
            cursor: pointer;
            border: none;
            background-color: var(--accent-white);
            color: var(--text-dark);
            width: 100%;
            transition: opacity 0.2s;
            margin-top: auto; /* Прижимает кнопку к низу */
        }
        .btn:hover { opacity: 0.9; }

        /* КАРТОЧКА ДЕТАЛЕЙ */
        #detail-view {
            display: none;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        .detail-card { 
            background-color: var(--card-bg); 
            border: 1px solid var(--card-border);
            border-radius: 20px; 
            padding: 24px; 
            display: flex; 
            gap: 40px; 
            align-items: flex-start; 
        }

        .detail-slider { 
            flex: 1; 
            background-color: var(--card-bg); /* ИСПРАВЛЕНО: убрали белый фон */
            border-radius: 12px; 
            aspect-ratio: 1 / 1; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
        }
        .detail-slider img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .slider-btn { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            background: rgba(30, 30, 30, 0.7); 
            color: white;
            border: none; 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            cursor: pointer; 
            z-index: 2; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .slider-btn:hover { background: rgba(0, 0, 0, 0.9); }
        .slider-btn-prev { left: 10px; } 
        .slider-btn-next { right: 10px; }
        
        .detail-info { 
            flex: 1; 
            text-align: left; 
            display: flex;
            flex-direction: column;
        }
        
        .detail-name { 
            font-size: 26px; 
            font-weight: 800; 
            margin: 0 0 10px 0; 
        }
        
        .detail-desc { 
            font-size: 14px; 
            color: var(--text-gray);
            margin-bottom: 24px; 
            line-height: 1.5; 
        }
        
        .detail-specs-box {
            background-color: #2e2e2e;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 30px;
        }

        .detail-specs { 
            margin: 0;
            padding-left: 15px;
            font-size: 13px; 
            line-height: 1.6; 
            color: #dddddd;
            white-space: pre-line; /* Чтобы \n работал как перенос строки */
        }
        
        .detail-buy-btn { 
            background-color: var(--accent-white); 
            color: var(--text-dark); 
            text-decoration: none; 
            padding: 14px 0; 
            border-radius: 8px; 
            font-weight: 800; 
            font-size: 14px;
            display: block; 
            text-align: center;
            text-transform: uppercase;
        }
        .detail-buy-btn:hover { opacity: 0.9; }

        .detail-cancel-btn { 
            background: none; 
            border: none; 
            color: var(--text-gray); 
            margin-top: 16px; 
            cursor: pointer; 
            font-size: 14px;
            text-decoration: underline;
            text-align: center;
            width: 100%;
        }
        .detail-cancel-btn:hover { color: white; }

        @media (max-width: 900px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-card { flex-direction: column; gap: 20px;}
            .detail-slider { width: 100%; max-width: 450px; margin: 0 auto;}
        }
        @media (max-width: 550px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; width: 95%; }
            .logo { font-size: 60px; }
            .cat-btn { font-size: 12px; padding: 6px 15px; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="logo" onclick="closeDetail()">Bluora</div>

    <div id="main-view">
        <nav class="categories">
            <button class="cat-btn" onclick="filter('all')">ALL</button>
            <button class="cat-btn" onclick="filter('shirts')">SHIRTS</button>
            <button class="cat-btn" onclick="filter('pants')">PANTS</button>
            <button class="cat-btn" onclick="filter('hoodies')">HOODIES</button>
            <button class="cat-btn" onclick="filter('hats')">HATS</button>
            <button class="cat-btn" onclick="filter('shoes')">SHOES</button>
            <button class="cat-btn" onclick="filter('accessories')">ACCESSORIES</button>
        </nav>
        <main class="product-grid" id="grid"></main>
    </div>

    <div id="detail-view">
        <div class="detail-card">
            <div class="detail-slider">
                <button class="slider-btn slider-btn-prev" onclick="prevImg()">&#10094;</button>
                <img id="detail-img" src="" alt="">
                <button class="slider-btn slider-btn-next" onclick="nextImg()">&#10095;</button>
            </div>
            <div class="detail-info">
                <h2 class="detail-name" id="detail-name">Clothes Name</h2>
                <div class="detail-desc" id="detail-desc"></div>
                <div class="detail-specs-box">
                    <div class="detail-specs" id="detail-specs"></div>
                </div>
                <a href="https://web.telegram.org/k/#@bluorabot" class="detail-buy-btn" target="_blank">ORDER VIA TELEGRAM</a>
                <button class="detail-cancel-btn" onclick="closeDetail()">Back to catalog</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                name: "Acne Studio Hoodie",
                type: "Replica",
                category: "hoodies",
                images: ["https://i.postimg.cc/85zK6L3t/image-62795b.png"], // Замени на свои ссылки
                description: "Бомбовая худи Акне Студио в черном цвете.",
                specs: "- цвета: Black"
            },
            {
                id: 2,
                name: "Balenciaga Runner 2",
                type: "Replica",
                category: "shoes",
                images: ["https://i.postimg.cc/85zK6L3t/image-62795b.png"],
                description: "Кроссовки Баленсиага в большом количестве расцветок",
                specs: "- цвета: All\n- размеры: от 35 до 46"
            },
            {
                id: 3,
                name: "Stone Island Sweater (Washed)",
                type: "Replica",
                category: "hoodies",
                images: ["https://i.postimg.cc/85zK6L3t/image-62795b.png"],
                description: "Свитер Стонайланд с эффектом выцветания ткани",
                specs: "- цвета: Dark Gray, Black\n- размеры: M, L, XL, 2XL"
            },
        ];

        const telegramLink = "https://web.telegram.org/k/#@bluorabot";

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; 
            items.forEach(item => {
                const coverImg = (item.images && item.images.length > 0) ? item.images[0] : '';
                grid.innerHTML += `
                    <div class="card">
                        <div class="image-container" onclick="openDetail(${item.id})">
                            ${coverImg ? `<img src="${coverImg}" alt="${item.name}">` : `<span class="placeholder-text">image</span>`}
                        </div>
                        <div class="info">
                            <div class="name-type">
                                <span class="item-name">${item.name}</span>
                                <span class="item-type">${item.type}</span>
                            </div>
                            <div class="card-buttons">
                                <button class="btn" onclick="openDetail(${item.id})">INFO</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filter(cat) { render(cat === 'all' ? products : products.filter(p => p.category === cat)); }

        let currentItem = null;
        let currentImgIndex = 0;

        function openDetail(id) {
            currentItem = products.find(p => p.id === id);
            if (!currentItem) return;
            document.getElementById('detail-name').innerText = currentItem.name;
            document.getElementById('detail-desc').innerText = currentItem.description;
            document.getElementById('detail-specs').innerText = currentItem.specs;
            currentImgIndex = 0;
            updateSliderView();
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }

        function updateSliderView() {
            const imgEl = document.getElementById('detail-img');
            imgEl.src = currentItem.images[currentImgIndex];
        }

        function nextImg() {
            currentImgIndex = (currentImgIndex + 1) % currentItem.images.length;
            updateSliderView();
        }

        function prevImg() {
            currentImgIndex = (currentImgIndex - 1 + currentItem.images.length) % currentItem.images.length;
            updateSliderView();
        }

        render(products);
    </script>
</body>
</html>
