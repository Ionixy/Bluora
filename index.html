<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluora | Archive Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@300;400;700;900&family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #050505;
            --card-gray: #0f0f0f;
            --accent-offwhite: #e0e0e0;
            --gothic-font: 'UnifrakturMaguntia', serif;
        }

        /* Текстура шума на фоне */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--accent-offwhite);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        /* --- ЛОГОТИП --- */
        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(70px, 12vw, 130px);
            margin: 40px 0 10px 0;
            text-align: center;
            letter-spacing: -2px;
            cursor: pointer;
            transition: all 0.5s ease;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.1));
        }
        
        .logo:hover {
            letter-spacing: 5px;
            opacity: 0.7;
        }

        .logo-divider {
            width: 150px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            margin-bottom: 40px;
        }

        /* --- КАТЕГОРИИ --- */
        .categories {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 50px;
            padding: 0 15px;
        }

        .cat-btn {
            background: none;
            color: #666;
            border: 1px solid #1a1a1a;
            padding: 10px 20px;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 700;
        }
        
        .cat-btn:hover, .cat-btn.active {
            color: #fff;
            border-color: #fff;
            background: rgba(255,255,255,0.03);
        }

        /* --- СЕТКА ТОВАРОВ --- */
        #main-view { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 1200px;
            width: 90%;
            padding-bottom: 80px;
        }

        /* --- КАРТОЧКА --- */
        .card {
            background-color: var(--card-gray);
            border: 1px solid #141414;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .card:hover {
            border-color: #444;
            transform: translateY(-5px);
        }

        .image-container {
            width: 100%;
            aspect-ratio: 4 / 5;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            filter: grayscale(0.1) contrast(1.05);
        }
        
        .image-container img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            transition: 0.6s ease;
        }
        
        .card:hover .image-container img {
            transform: scale(1.08);
            filter: grayscale(0);
        }

        .info {
            padding: 20px;
            text-align: left;
            display: flex;
            flex-direction: column;
        }

        .name-type {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-height: 40px;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .item-type {
            display: block;
            color: #555;
            font-size: 11px;
            font-weight: 400;
            margin-top: 4px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            background: transparent;
            border: 1px solid var(--accent-offwhite);
            color: var(--accent-offwhite);
            text-align: center;
            text-decoration: none;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 2px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        
        .btn:hover {
            background-color: var(--accent-offwhite);
            color: #000;
        }

        /* --- ДЕТАЛЬНОЕ ОКНО --- */
        #detail-view {
            display: none;
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            animation: fadeIn 0.4s ease;
        }
        
        .detail-card {
            background-color: #080808;
            border: 1px solid #1a1a1a;
            display: flex;
            gap: 0;
            overflow: hidden;
        }
        
        .detail-slider {
            flex: 1.2;
            background-color: #fff;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1/1;
        }
        
        .detail-slider img { 
            width: 85%; 
            height: 85%; 
            object-fit: contain; 
        }

        .slider-btn {
            background: rgba(0,0,0,0.1); 
            color: #000; 
            border: none;
            width: 40px; 
            height: 40px; 
            border-radius: 50%;
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%);
            cursor: pointer; 
            z-index: 5; 
            transition: 0.2s;
        }
        
        .slider-btn:hover { background: rgba(0,0,0,0.8); color: #fff; }
        .slider-btn-prev { left: 10px; }
        .slider-btn-next { right: 10px; }

        .detail-info {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }
        
        .detail-name {
            font-family: var(--gothic-font);
            font-size: 45px;
            margin-bottom: 15px;
            color: #fff;
        }
        
        .detail-desc {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
            border-left: 1px solid #333;
            padding-left: 15px;
        }
        
        .detail-specs {
            font-size: 12px;
            color: #555;
            margin-bottom: 35px;
            white-space: pre-line;
        }
        
        .detail-buy-btn {
            background: #fff; 
            color: #000; 
            text-decoration: none;
            padding: 18px; 
            font-weight: 900; 
            text-align: center;
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-size: 13px;
        }
        
        .detail-cancel-btn {
            background: none; 
            border: none; 
            color: #444; 
            margin-top: 25px;
            cursor: pointer; 
            text-decoration: underline; 
            font-size: 11px;
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        /* --- АДАПТИВНОСТЬ --- */
        @media (max-width: 1024px) { 
            .product-grid { grid-template-columns: repeat(3, 1fr); } 
        }
        @media (max-width: 800px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-card { flex-direction: column; }
            .detail-info { padding: 30px; }
        }
        @media (max-width: 500px) {
            .product-grid { grid-template-columns: 1fr; }
            .logo { font-size: 70px; }
        }

        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
    </style>
</head>
<body>

    <div class="logo" onclick="closeDetail()">Bluora</div>
    <div class="logo-divider"></div>

    <div id="main-view">
        <nav class="categories">
            <button class="cat-btn active" onclick="filter('all', this)">ALL</button>
            <button class="cat-btn" onclick="filter('shirts', this)">SHIRTS</button>
            <button class="cat-btn" onclick="filter('pants', this)">PANTS</button>
            <button class="cat-btn" onclick="filter('hoodies', this)">HOODIES</button>
            <button class="cat-btn" onclick="filter('hats', this)">HATS</button>
            <button class="cat-btn" onclick="filter('shoes', this)">SHOES</button>
            <button class="cat-btn" onclick="filter('accessories', this)">ACCESSORIES</button>
        </nav>
        <main class="product-grid" id="grid"></main>
    </div>

    <div id="detail-view">
        <div class="detail-card">
            <div class="detail-slider">
                <button class="slider-btn slider-btn-prev" onclick="prevImg()">&#10094;</button>
                <img id="detail-img" src="" alt="">
                <button class="slider-btn slider-btn-next" onclick="nextImg()">&#10095;</button>
            </div>
            <div class="detail-info">
                <h2 class="detail-name" id="detail-name">Archive Item</h2>
                <div class="detail-desc" id="detail-desc"></div>
                <div class="detail-specs" id="detail-specs"></div>
                <a href="https://t.me/bluoralv" class="detail-buy-btn" target="_blank">Contact via Telegram</a>
                <button class="detail-cancel-btn" onclick="closeDetail()">Return to archive</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { 
                id: 1, 
                name: "Polo Ralph Lauren", 
                type: "Archive Replica", 
                category: "shirts", 
                images: ["https://big-tall.com/cdn/shop/products/s7-1355336_lifestyle.png?v=1728922275"], 
                description: "Базовая оверсайз футболка в глубоком черном цвете.", 
                specs: "• 100% Heavy Cotton\n• Boxy Fit\n• Sizes: S / M / L" 
            },
            { 
                id: 2, 
                name: "Acne Studio Hoodie", 
                type: "Opium Collection", 
                category: "hoodies", 
                images: ["https://www.acnestudios.com/dw/image/v2/AAXV_PRD/on/demandware.static/-/Sites-acne-product-catalog/default/dwe37b921b/images/CI/CI0136-/2000x/CI0136-900_Z.jpg?sw=1120&sh=1680"], 
                description: "Массивное худи с характерным готическим силуэтом.", 
                specs: "• Washed Black\n• Distressed Edges\n• One Size" 
            },
            { 
                id: 3, 
                name: "Diesel Jeans", 
                type: "Archive Pants", 
                category: "pants", 
                images: ["https://images.clothes.com/example-jeans.jpg"], 
                description: "Классические джинсы Diesel с легким эффектом состаренности.", 
                specs: "• Premium Denim\n• Slim-Straight Fit" 
            },            
            { 
                id: 4, 
                name: "Zip-Up Hoodie PRL", 
                type: "Essential Archive", 
                category: "hoodies", 
                images: ["https://img01.ztat.net/article/spp-media-p1/509f9b0f498f4db9963170b173602ad9/72a44035208a480582b153883a9d1c80.jpg?imwidth=762&filter=packshot"], 
                description: "Зип-худи Ralph Lauren на металлической молнии.", 
                specs: "• Color: Heather Grey\n• Silver Hardware" 
            }, 
            { 
                id: 5, 
                name: "Moncler Beanie", 
                type: "Accessory Piece", 
                category: "hats", 
                images: ["https://moncler-cdn.thron.com/api/v1/content-delivery/shares/dpx6uv/contents/K20913B00074M1900999_F/image/wool-and-cashmere-beanie-men-black-moncler,-1-of-0.jpg?w=800&q=80"], 
                description: "Шерстяная шапка Moncler с оригинальным патчем.", 
                specs: "• Wool & Cashmere\n• Color: Black" 
            },
            { 
                id: 6, 
                name: "Nike Dunk Low", 
                type: "Footwear Archive", 
                category: "shoes", 
                images: ["https://images.shoes.com/example-shoes.jpg"], 
                description: "Классические силуэты для ежедневного ношения.", 
                specs: "• Size range: 40-45 EU" 
            },
            { 
                id: 7, 
                name: "Leather Belt", 
                type: "Hardware", 
                category: "accessories", 
                images: ["https://images.accs.com/example-belt.jpg"], 
                description: "Кожаный ремень с массивной металлической пряжкой.", 
                specs: "• 100% Genuine Leather" 
            }
        ];

        let currentItem = null;
        let currentImgIndex = 0;

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            items.forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <div class="image-container" onclick="openDetail(${item.id})">
                            <img src="${item.images[0]}" alt="${item.name}">
                        </div>
                        <div class="info">
                            <div class="name-type">
                                ${item.name}
                                <span class="item-type">${item.type}</span>
                            </div>
                            <a href="https://t.me/bluoralv" class="btn" target="_blank">INFO</a>
                        </div>
                    </div>
                `;
            });
        }

        function filter(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            render(cat === 'all' ? products : products.filter(p => p.category === cat));
        }

        function openDetail(id) {
            currentItem = products.find(p => p.id === id);
            if (!currentItem) return;
            
            document.getElementById('detail-name').innerText = currentItem.name;
            document.getElementById('detail-desc').innerText = currentItem.description;
            document.getElementById('detail-specs').innerText = currentItem.specs;
            currentImgIndex = 0;
            
            updateSliderView();
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }

        function updateSliderView() {
            const imgEl = document.getElementById('detail-img');
            imgEl.src = currentItem.images[currentImgIndex];
        }

        function nextImg() {
            currentImgIndex = (currentImgIndex + 1) % currentItem.images.length;
            updateSliderView();
        }

        function prevImg() {
            currentImgIndex = (currentImgIndex - 1 + currentItem.images.length) % currentItem.images.length;
            updateSliderView();
        }

        // Инициализация
        render(products);
    </script>
</body>
</html>
