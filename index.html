<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluora Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #222222;
            --card-bg: #333333;
            --text-white: #ffffff;
            --accent-white: #ffffff;
            --text-dark: #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-text-size-adjust: 100%;
        }

        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: 140px;
            margin: 20px 0 10px 0;
            text-align: center;
            font-weight: 400;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .logo:hover { opacity: 0.8; }

        #main-view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 50px;
            padding: 0 15px;
        }

        .cat-btn {
            background-color: var(--accent-white);
            color: var(--text-dark);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 14px; 
            cursor: pointer;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1100px;
            width: 90%;
            padding-bottom: 50px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
            width: 100%;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }

        .image-container {
            width: 90%;
            height: 250px;
            background-color: #444; /* Фон на случай если картинка не грузится */
            border-radius: 15px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }
        .image-container img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .placeholder-text { color: #888; font-weight: 700; text-transform: uppercase; }

        .info {
            text-align: center;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            width: 90%;
            box-sizing: border-box;
        }

        .name-type {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .item-type {
            color: #aaaaaa;
            font-weight: 400;
        }

        .card-buttons {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .btn {
            font-family: 'Inter', sans-serif !important; 
            text-transform: uppercase; 
            font-weight: 800; 
            font-size: 14px;
            text-decoration: none;
            padding: 10px 0;
            border-radius: 10px; 
            display: inline-block;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
            flex: 1;
            text-align: center;
        }
        .btn:hover { opacity: 0.9; }
        
        .btn-buy {
            background-color: var(--accent-white);
            color: var(--text-dark);
        }

        #detail-view {
            display: none;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.3s ease;
        }

        .detail-card {
            background-color: #444444;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .detail-slider {
            flex: 1;
            background-color: #555;
            border-radius: 15px;
            aspect-ratio: 3 / 4;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .detail-slider img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        .slider-btn {
            background: rgba(255, 255, 255, 0.7);
            color: #000;
            border: none;
            cursor: pointer;
            z-index: 2;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        .slider-btn-prev { left: 15px; }
        .slider-btn-next { right: 15px; }

        .detail-info { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
        }
        .detail-name { font-size: 32px; font-weight: 800; margin-bottom: 20px; }
        .detail-desc, .detail-specs { font-size: 14px; margin-bottom: 20px; line-height: 1.5; }

        .detail-buy-btn {
            background-color: var(--accent-white);
            color: var(--text-dark);
            text-decoration: none;
            padding: 12px 0;
            border-radius: 10px;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            text-align: center;
            width: 100%; 
            max-width: 300px; 
            display: block;
        }

        .detail-cancel-btn {
            background: none; border: none; color: #aaa;
            margin-top: 15px; cursor: pointer; font-weight: 700;
            text-transform: lowercase;
            display: block;
        }

        @media (max-width: 900px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-card { flex-direction: column; padding: 30px; gap: 20px; }
            .image-container { height: 200px; }
        }

        @media (max-width: 550px) {
            .logo { font-size: 80px; }
            .product-grid { grid-template-columns: 1fr; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="logo" onclick="closeDetail()">Bluora</div>

    <div id="main-view">
        <nav class="categories">
            <button class="cat-btn" onclick="filter('all')">ALL</button>
            <button class="cat-btn" onclick="filter('shirts')">SHIRTS</button>
            <button class="cat-btn" onclick="filter('pants')">PANTS</button>
            <button class="cat-btn" onclick="filter('hoodies')">HOODIES</button>
            <button class="cat-btn" onclick="filter('hats')">HATS</button>
            <button class="cat-btn" onclick="filter('shoes')">SHOES</button>
            <button class="cat-btn" onclick="filter('accessories')">ACCESSORIES</button>
        </nav>
        <main class="product-grid" id="grid"></main>
    </div>

    <div id="detail-view">
        <div class="detail-card">
            <div class="detail-slider">
                <button class="slider-btn slider-btn-prev" onclick="prevImg()">&#10094;</button>
                <img id="detail-img" src="" alt="">
                <button class="slider-btn slider-btn-next" onclick="nextImg()">&#10095;</button>
            </div>
            <div class="detail-info">
                <h2 class="detail-name" id="detail-name">Clothes Name</h2>
                <div class="detail-desc" id="detail-desc"></div>
                <div class="detail-specs" id="detail-specs"></div>
                <a href="https://web.telegram.org/k/#@bluorabot" class="detail-buy-btn" target="_blank">INFO</a>
                <button class="detail-cancel-btn" onclick="closeDetail()">cancel</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                name: "Acne Studio Hoodie",
                type: "Replica",
                category: "hoodies",
                images: [
                    "https://placehold.co/400x533/white/black?text=Acne+Hoodie" 
                ],
                description: "Бомбовая худи Акне Студио в черном цвете.",
                specs: "- цвета: Black"
            },
            {
                id: 2,
                name: "Balenciaga Runner 2",
                type: "Replica",
                category: "shoes",
                images: [
                    "https://placehold.co/400x533/white/black?text=Balenciaga+1",
                    "https://placehold.co/400x533/white/black?text=Balenciaga+2",
                    "https://placehold.co/400x533/white/black?text=Balenciaga+3"
                ],
                description: "Кроссовки Баленсиага в большом количестве расцветок",
                specs: "- цвета: All\n- размеры: от 35 до 46"
            },
            {
                id: 3,
                name: "Stone Island Sweater ( Washed )",
                type: "Replica",
                category: "hoodies",
                images: [
                    "https://placehold.co/400x533/white/black?text=Stone+Island"
                ],
                description: "Свитер Стонайланд с высвесшим эффектом ткани",
                specs: "- цвета: Dark Gray, Black\n- размеры: M, L, XL, 2XL"
            },
        ];

        const telegramLink = "https://web.telegram.org/k/#@bluorabot";

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; 
            items.forEach(item => {
                const coverImg = (item.images && item.images.length > 0) ? item.images[0] : null;
                grid.innerHTML += `
                    <div class="card">
                        <div class="image-container" onclick="openDetail(${item.id})">
                            ${coverImg ? `<img src="${coverImg}" alt="${item.name}">` : `<span class="placeholder-text">image</span>`}
                        </div>
                        <div class="info">
                            <div class="name-type">${item.name},<br><span class="item-type">${item.type}</span></div>
                            <div class="card-buttons">
                                <a href="${telegramLink}" class="btn btn-buy" target="_blank">INFO</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filter(cat) { render(cat === 'all' ? products : products.filter(p => p.category === cat)); }

        let currentItem = null;
        let currentImgIndex = 0;

        function openDetail(id) {
            currentItem = products.find(p => p.id === id);
            if (!currentItem) return;
            document.getElementById('detail-name').innerText = currentItem.name;
            document.getElementById('detail-desc').innerText = currentItem.description;
            document.getElementById('detail-specs').innerText = currentItem.specs;
            currentImgIndex = 0;
            updateSliderView();
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }

        function updateSliderView() {
            const imgEl = document.getElementById('detail-img');
            if (currentItem.images && currentItem.images.length > 0) {
                imgEl.src = currentItem.images[currentImgIndex];
                imgEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none';
            }
        }

        function nextImg() {
            if (!currentItem || !currentItem.images.length) return;
            currentImgIndex = (currentImgIndex + 1) % currentItem.images.length;
            updateSliderView();
        }

        function prevImg() {
            if (!currentItem || !currentItem.images.length) return;
            currentImgIndex = (currentImgIndex - 1 + currentItem.images.length) % currentItem.images.length;
            updateSliderView();
        }

        render(products);
    </script>
</body>
</html>
