<script>
(function() {
    // --- Пароль в закодированном виде (base64) ---
    const encodedPassword = "VV8hMnNRb2RpS0w5LT8y";
    const ADMIN_PASSWORD = atob(encodedPassword);

    let products = [];
    let adminToken = '';

    let currentCategory = 'all',
        currentSearch = '',
        currentTopFilter = 'all',
        currentDetailItem = null,
        currentImgIndex = 0,
        isAdminAuthenticated = false;

    let editingProductId = null;

    async function loadProducts() {
        const res = await fetch('/api/products');
        products = await res.json();
        renderProducts();
    }

    function isProductNew(p) {
        return p.isNewDrop && p.newDropUntil && Date.now() < p.newDropUntil;
    }

    function getSortedProducts() {
        const newDrop = products.filter(p => isProductNew(p)).sort((a, b) => b.id - a.id);
        const regular = products.filter(p => !isProductNew(p)).sort((a, b) => b.id - a.id);
        return [...newDrop, ...regular];
    }

    function renderProducts() {
        let filtered = getSortedProducts().filter(p => {
            if (currentSearch && !p.name.toLowerCase().includes(currentSearch.toLowerCase())) return false;
            if (currentCategory !== 'all' && p.category !== currentCategory) return false;
            if (currentTopFilter === 'new' && !isProductNew(p)) return false;
            return true;
        });

        document.getElementById('productCounter').innerText =
            `📦 ${filtered.length} product${filtered.length !== 1 ? 's' : ''} found`;

        const grid = document.getElementById('grid');

        if (!filtered.length) {
            grid.innerHTML = '<div style="text-align:center; grid-column:1/-1; padding:40px;">No products found</div>';
            return;
        }

        grid.innerHTML = filtered.map(p => `
            <div class="card">
                <div class="image-container" data-id="${p.id}">
                    ${isProductNew(p) ? '<span class="new-badge">NEW DROP</span>' : ''}
                    <img src="${p.images[0]}" loading="lazy">
                </div>
                <div class="info">
                    <div class="name-type">
                        ${p.name}
                        <span class="item-type">${p.type}</span>
                    </div>
                    <button class="btn-buy" data-id="${p.id}">DETAILS</button>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.image-container[data-id]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                openDetail(parseInt(el.dataset.id));
            });
        });

        document.querySelectorAll('.btn-buy[data-id]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                openDetail(parseInt(btn.dataset.id));
            });
        });
    }

    function openDetail(id) {
        const p = products.find(p => p.id === id);
        if (!p) return;

        currentDetailItem = p;
        currentImgIndex = 0;

        document.getElementById('main-view').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        document.getElementById('detail-name').innerText = p.name;
        document.getElementById('detail-desc').innerHTML = p.description;

        let lines = p.specs.split('\n');
        let formattedLines = lines.map(line => {
            if (line.trim().startsWith('- ')) {
                return line.replace(/^(- .*?)(:| :)/, '<span class="spec-bold">$1$2</span>');
            }
            return line;
        });

        let formattedSpecs = formattedLines.join('<br>');
        document.getElementById('detail-specs').innerHTML = formattedSpecs;

        const hasMultiple = p.images.length > 1;
        document.getElementById('prevBtn').style.display = hasMultiple ? 'flex' : 'none';
        document.getElementById('nextBtn').style.display = hasMultiple ? 'flex' : 'none';

        updateDetailImage();
        renderThumbnails();
    }

    function updateDetailImage() {
        const img = document.getElementById('detail-img');
        if (currentDetailItem?.images.length) {
            img.src = currentDetailItem.images[currentImgIndex % currentDetailItem.images.length];
        }

        document.querySelectorAll('.thumbnail').forEach((thumb, idx) => {
            if (idx === currentImgIndex) thumb.classList.add('active');
            else thumb.classList.remove('active');
        });
    }

    function renderThumbnails() {
        const strip = document.getElementById('thumbnailStrip');
        if (!currentDetailItem) return;

        if (currentDetailItem.images.length <= 1) {
            strip.innerHTML = '';
            return;
        }

        strip.innerHTML = currentDetailItem.images.map((img, idx) => `
            <img class="thumbnail ${idx === currentImgIndex ? 'active' : ''}" src="${img}" data-index="${idx}">
        `).join('');

        document.querySelectorAll('.thumbnail').forEach(thumb => {
            thumb.addEventListener('click', () => setImageIndex(parseInt(thumb.dataset.index)));
        });
    }

    function setImageIndex(idx) {
        currentImgIndex = idx;
        updateDetailImage();
    }

    function nextImg() {
        if (currentDetailItem?.images.length > 1) {
            currentImgIndex = (currentImgIndex + 1) % currentDetailItem.images.length;
            updateDetailImage();
        }
    }

    function prevImg() {
        if (currentDetailItem?.images.length > 1) {
            currentImgIndex = (currentImgIndex - 1 + currentDetailItem.images.length) % currentDetailItem.images.length;
            updateDetailImage();
        }
    }

    function closeDetail() {
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('detail-view').style.display = 'none';
        renderProducts();
    }

    function initFilters() {
        document.getElementById('searchInput').addEventListener('input', e => {
            currentSearch = e.target.value;
            renderProducts();
        });

        document.querySelectorAll('.filter-btn').forEach(btn =>
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTopFilter = btn.dataset.filter;
                renderProducts();
            })
        );

        document.querySelectorAll('.cat-btn').forEach(btn =>
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.cat;
                renderProducts();
            })
        );
    }

    function showPasswordModal() {
        document.getElementById('passwordModal').classList.add('active');
        document.getElementById('adminPassword').focus();
    }

    function checkPasswordAndOpenAdmin() {
        const enteredPassword = document.getElementById('adminPassword').value;

        if (enteredPassword === ADMIN_PASSWORD) {
            adminToken = enteredPassword;
            isAdminAuthenticated = true;
            document.getElementById('passwordModal').classList.remove('active');
            document.getElementById('passwordError').innerText = '';
            openAdminPanel();
        } else {
            document.getElementById('passwordError').innerText = 'Wrong password.';
        }
    }

    function openAdminPanel() {
        if (!isAdminAuthenticated) {
            showPasswordModal();
            return;
        }
        editingProductId = null;
        renderAdminPanel();
        document.getElementById('adminModal').classList.add('active');
    }

    function renderAdminPanel() {
        const container = document.getElementById('adminPanelContent');
        const sorted = getSortedProducts();

        container.innerHTML = `
            <div class="admin-header">
                <h2><i class="fas fa-tools"></i> Admin Dashboard</h2>
                <button class="close-admin" id="closeAdminBtn">&times;</button>
            </div>

            <div class="admin-search">
                <input type="text" id="adminSearchInput" placeholder="🔍 Search products in admin...">
            </div>

            <div style="margin-bottom:20px;">
                <h3>Products List</h3>
                <div class="admin-products-grid" id="adminProductsGrid"></div>
            </div>

            <div class="admin-form" id="adminForm">
                <h3 style="margin-top:0; margin-bottom:1.5rem;" id="formTitle">➕ Add New Product</h3>

                <div class="form-row">
                    <input type="text" id="prodName" placeholder="Product Name">
                    <select id="prodCategory">
                        <option value="shirts">SHIRTS</option>
                        <option value="pants">PANTS</option>
                        <option value="hoodies">HOODIES</option>
                        <option value="hats">HATS</option>
                        <option value="shoes">SHOES</option>
                        <option value="accessories">ACCESSORIES</option>
                    </select>
                </div>

                <div class="form-row">
                    <input type="text" id="prodImages" placeholder="Image URLs (comma separated)">
                    <input type="text" id="prodSpecs" placeholder="Specifications (use format &quot;- Color : value\n- Size : value&quot;)">
                </div>

                <div id="imagePreviewContainer" class="image-preview"></div>

                <textarea id="prodDesc" placeholder="Description"></textarea>

                <label class="checkbox-label">
                    <input type="checkbox" id="prodIsNew">
                    <span>🔥 Mark as New Drop</span>
                </label>

                <div class="form-actions" style="display:flex; gap:15px; justify-content:flex-end; margin-top:20px;">
                    <button class="btn-secondary" id="cancelAdminFormBtn">Cancel</button>
                    <button class="btn-primary" id="saveProductBtn">Save Product</button>
                </div>
            </div>
        `;

        document.getElementById('closeAdminBtn').addEventListener('click', closeAdminModal);
        document.getElementById('cancelAdminFormBtn').addEventListener('click', resetAdminForm);

        const renderAdminList = () => {
            const searchVal = document.getElementById('adminSearchInput')?.value.toLowerCase() || '';
            const filtered = sorted.filter(p => p.name.toLowerCase().includes(searchVal));
            const gridDiv = document.getElementById('adminProductsGrid');

            gridDiv.innerHTML = filtered.map(p => `
                <div class="admin-product-card">
                    <img class="admin-product-img" src="${p.images[0]}">
                    <div class="admin-product-info">
                        <div class="admin-product-name">${p.name}</div>
                        <div class="admin-product-cat">${p.category}</div>
                    </div>
                    <div class="admin-product-actions">
                        <button class="edit-btn" data-id="${p.id}" title="Edit"><i class="fas fa-edit"></i></button>
                        <button class="clone-btn" data-id="${p.id}" title="Clone"><i class="fas fa-copy"></i></button>
                        <button class="delete-btn" data-id="${p.id}" title="Delete"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.edit-btn').forEach(btn =>
                btn.addEventListener('click', () => editProductForm(parseInt(btn.dataset.id)))
            );

            document.querySelectorAll('.clone-btn').forEach(btn =>
                btn.addEventListener('click', () => cloneProduct(parseInt(btn.dataset.id)))
            );

            document.querySelectorAll('.delete-btn').forEach(btn =>
                btn.addEventListener('click', () => deleteProductConfirm(parseInt(btn.dataset.id)))
            );
        };

        setTimeout(() => {
            const searchInput = document.getElementById('adminSearchInput');
            if (searchInput) searchInput.addEventListener('input', renderAdminList);
            renderAdminList();
            document.getElementById('saveProductBtn').onclick = () => saveProduct();
            attachImagePreview();
        }, 10);
    }

    function attachImagePreview() {
        const imagesInput = document.getElementById('prodImages');
        const previewDiv = document.getElementById('imagePreviewContainer');

        const updatePreview = () => {
            let urls = imagesInput.value.split(',').map(s => s.trim()).filter(s => s);
            previewDiv.innerHTML = urls.map(url => `<img src="${url}" onerror="this.style.opacity='0.3'">`).join('');
        };

        imagesInput.addEventListener('input', updatePreview);
        updatePreview();
    }

    function resetAdminForm() {
        editingProductId = null;
        document.getElementById('formTitle').innerText = '➕ Add New Product';
        document.getElementById('prodName').value = '';
        document.getElementById('prodCategory').value = 'shirts';
        document.getElementById('prodImages').value = '';
        document.getElementById('prodSpecs').value = '';
        document.getElementById('prodDesc').value = '';
        document.getElementById('prodIsNew').checked = false;
        attachImagePreview();
    }

    function editProductForm(id) {
        const p = products.find(p => p.id === id);
        if (!p) return;

        editingProductId = id;
        document.getElementById('formTitle').innerText = '✏️ Edit Product';
        document.getElementById('prodName').value = p.name;
        document.getElementById('prodCategory').value = p.category;
        document.getElementById('prodImages').value = p.images.join(', ');
        document.getElementById('prodSpecs').value = p.specs;
        document.getElementById('prodDesc').value = p.description;
        document.getElementById('prodIsNew').checked = p.isNewDrop;
        attachImagePreview();
        document.getElementById('adminForm').scrollIntoView({ behavior: 'smooth' });
    }

    async function cloneProduct(id) {
        const original = products.find(p => p.id === id);
        if (!original) return;

        const clone = {
            name: original.name + ' (copy)',
            type: original.type || 'Replica',
            category: original.category,
            images: original.images,
            description: original.description,
            specs: original.specs,
            isNewDrop: false,
            newDropUntil: null
        };

        const res = await fetch('/api/products', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-admin-token': adminToken
            },
            body: JSON.stringify(clone)
        });

        if (!res.ok) {
            alert('Unauthorized or server error while cloning.');
            return;
        }

        await loadProducts();
        renderAdminPanel();
    }

    async function saveProduct() {
        const product = {
            name: document.getElementById('prodName').value.trim(),
            type: 'Replica',
            category: document.getElementById('prodCategory').value,
            images: document.getElementById('prodImages').value
                .split(',')
                .map(s => s.trim())
                .filter(Boolean),
            specs: document.getElementById('prodSpecs').value.trim() || '- Colors : ...\n- Sizes : ...',
            description: document.getElementById('prodDesc').value.trim() || 'No description',
            isNewDrop: document.getElementById('prodIsNew').checked,
            newDropUntil: document.getElementById('prodIsNew').checked
                ? Date.now() + 7 * 24 * 60 * 60 * 1000
                : null
        };

        if (!product.name) {
            alert('Name required');
            return;
        }

        if (!product.images.length) {
            product.images = ['https://picsum.photos/id/1/400/500'];
        }

        let res;

        if (editingProductId !== null) {
            res = await fetch(`/api/products/${editingProductId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-token': adminToken
                },
                body: JSON.stringify(product)
            });
        } else {
            res = await fetch('/api/products', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-token': adminToken
                },
                body: JSON.stringify(product)
            });
        }

        if (!res.ok) {
            alert('Unauthorized or server error while saving.');
            return;
        }

        await loadProducts();
        renderAdminPanel();
        resetAdminForm();

        if (currentDetailItem && !products.find(p => p.id === currentDetailItem.id)) {
            closeDetail();
        }
    }

    async function deleteProductConfirm(id) {
        const p = products.find(p => p.id === id);
        if (!confirm(`Delete "${p?.name || 'this product'}"?`)) return;

        const res = await fetch(`/api/products/${id}`, {
            method: 'DELETE',
            headers: {
                'x-admin-token': adminToken
            }
        });

        if (!res.ok) {
            alert('Unauthorized or server error while deleting.');
            return;
        }

        await loadProducts();
        renderAdminPanel();

        if (currentDetailItem && currentDetailItem.id === id) {
            closeDetail();
        }
    }

    function closeAdminModal() {
        document.getElementById('adminModal').classList.remove('active');
    }

    window.openDetail = openDetail;
    window.closeDetail = closeDetail;
    window.nextImg = nextImg;
    window.prevImg = prevImg;
    window.setImageIndex = setImageIndex;
    window.closeAdminModal = closeAdminModal;
    window.editProductForm = editProductForm;
    window.deleteProductConfirm = deleteProductConfirm;
    window.resetAdminForm = resetAdminForm;
    window.cloneProduct = cloneProduct;

    document.getElementById('logoHome').addEventListener('click', closeDetail);
    document.getElementById('detailBackBtn').addEventListener('click', closeDetail);
    document.getElementById('prevBtn').addEventListener('click', prevImg);
    document.getElementById('nextBtn').addEventListener('click', nextImg);
    document.getElementById('adminBtn').addEventListener('click', () => isAdminAuthenticated ? openAdminPanel() : showPasswordModal());
    document.getElementById('submitPasswordBtn').addEventListener('click', checkPasswordAndOpenAdmin);
    document.getElementById('adminPassword').addEventListener('keypress', e => {
        if (e.key === 'Enter') checkPasswordAndOpenAdmin();
    });

    window.addEventListener('scroll', () => {
        document.getElementById('goTop').classList.toggle('visible', window.scrollY > 300);
    });

    document.getElementById('goTop').addEventListener('click', () =>
        window.scrollTo({ top: 0, behavior: 'smooth' })
    );

    initFilters();
    loadProducts();
})();
</script>
