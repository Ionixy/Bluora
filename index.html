<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluora Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #262626;
            --text-white: #ffffff;
            --accent-white: #ffffff;
            --text-gray: #aaaaaa;
            --text-dark: #000000;
            --transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Исправленный логотип */
        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: 64px; 
            margin: 40px 0 20px 0;
            text-align: center;
            font-weight: 400;
            cursor: pointer;
            transition: var(--transition);
        }
        .logo:hover {
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        #main-view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Стилизация кнопок категорий */
        .categories {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
            padding: 0 15px;
        }

        .cat-btn {
            background: transparent;
            color: var(--text-white);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px; 
            cursor: pointer;
            transition: var(--transition);
        }

        .cat-btn:hover {
            background-color: var(--accent-white);
            color: var(--text-dark);
            border-color: var(--accent-white);
        }

        /* Сетка товаров */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 90%;
            padding-bottom: 60px;
        }

        /* Исправленная карточка */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .card:hover { 
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.2);
        }

        .image-container {
            width: 100%;
            aspect-ratio: 1 / 1; /* Квадратные картинки для симметрии */
            overflow: hidden;
            background: #333;
            cursor: pointer;
        }
        
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .card:hover .image-container img {
            transform: scale(1.05);
        }

        /* Исправленный блок информации (чтобы текст не налезал) */
        .info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 15px;
        }

        .name-type {
            min-height: 50px; /* Запас под две строки текста */
        }

        .item-name {
            font-size: 16px;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .item-type {
            color: var(--text-gray);
            font-weight: 400;
            font-size: 13px;
        }

        .btn {
            background-color: var(--accent-white);
            color: var(--text-dark);
            text-align: center;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }

        /* Окно деталей */
        #detail-view {
            display: none;
            width: 90%;
            max-width: 1000px;
            padding: 40px 20px;
            animation: fadeIn 0.4s ease;
        }
        
        .detail-card { 
            background-color: var(--card-bg); 
            border-radius: 24px; 
            padding: 40px; 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px; 
            align-items: center; 
        }

        .detail-slider { 
            position: relative; 
            width: 100%;
            aspect-ratio: 1;
            background: #111;
            border-radius: 12px;
            display: flex;
            align-items: center;
        }
        
        .detail-slider img { width: 100%; height: 100%; object-fit: contain; }

        .slider-btn { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(5px);
            border: none; 
            color: white;
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            cursor: pointer; 
            z-index: 2; 
        }
        .slider-btn:hover { background: rgba(255,255,255,0.2); }
        .slider-btn-prev { left: 10px; } 
        .slider-btn-next { right: 10px; }

        .detail-info { text-align: left; }
        .detail-name { font-size: 32px; font-weight: 800; margin: 0 0 15px 0; }
        .detail-desc { color: var(--text-gray); margin-bottom: 20px; line-height: 1.6; }
        .detail-specs { font-size: 14px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 25px; white-space: pre-line; }

        .detail-buy-btn { 
            background-color: white; 
            color: black; 
            text-decoration: none; 
            padding: 15px; 
            border-radius: 10px; 
            font-weight: 800; 
            display: block; 
            text-align: center;
        }
        
        .detail-cancel-btn { 
            background: none; 
            border: none; 
            color: var(--text-gray); 
            margin-top: 20px; 
            cursor: pointer; 
            width: 100%;
            text-decoration: underline;
        }

        /* Адаптивность */
        @media (max-width: 850px) {
            .detail-card { grid-template-columns: 1fr; padding: 20px; }
            .logo { font-size: 48px; }
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div class="logo" onclick="closeDetail()">Bluora</div>

    <div id="main-view">
        <nav class="categories">
            <button class="cat-btn" onclick="filter('all')">ALL</button>
            <button class="cat-btn" onclick="filter('shirts')">SHIRTS</button>
            <button class="cat-btn" onclick="filter('pants')">PANTS</button>
            <button class="cat-btn" onclick="filter('hoodies')">HOODIES</button>
            <button class="cat-btn" onclick="filter('hats')">HATS</button>
            <button class="cat-btn" onclick="filter('shoes')">SHOES</button>
            <button class="cat-btn" onclick="filter('accessories')">ACCESSORIES</button>
        </nav>
        <main class="product-grid" id="grid"></main>
    </div>

    <div id="detail-view">
        <div class="detail-card">
            <div class="detail-slider">
                <button class="slider-btn slider-btn-prev" onclick="prevImg()">&#10094;</button>
                <img id="detail-img" src="" alt="">
                <button class="slider-btn slider-btn-next" onclick="nextImg()">&#10095;</button>
            </div>
            <div class="detail-info">
                <h2 class="detail-name" id="detail-name">Clothes Name</h2>
                <div class="detail-desc" id="detail-desc"></div>
                <div class="detail-specs" id="detail-specs"></div>
                <a href="https://web.telegram.org/k/#@bluorabot" class="detail-buy-btn" target="_blank">ORDER VIA TELEGRAM</a>
                <button class="detail-cancel-btn" onclick="closeDetail()">Back to catalog</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                name: "Acne Studio Hoodie",
                type: "Replica",
                category: "hoodies",
                images: ["https://dl.springsfern.in/dl/AAAAADCx4UBRYRK3G2sMQg/xMgSJhdHKgLCo3wKxUSDpxSafAUt-k2cmpUlC1doMY8"],
                description: "Бомбовая худи Акне Студио в черном цвете. Оверсайз крой, плотный хлопок.",
                specs: "• Цвет: Black\n• Материал: 100% Хлопок\n• Крой: Oversize"
            },
            {
                id: 2,
                name: "Balenciaga Runner 2",
                type: "Replica",
                category: "shoes",
                images: [
                    "https://dl.springsfern.in/dl/AAAAADCx4UBRYRK3G2sMQQ/7RWs2_3ToHzAmYgjUX-l_w8ywjc2Pr9jBnRTJInAfmI",
                    "https://dl.springsfern.in/dl/AAAAADCx4UBRYRK3G2sMQw/A-kJHkL3kspbjIg_S5KBNnJiq-8hcddtwlHJMPREoqw",
                    "https://dl.springsfern.in/dl/AAAAADCx4UBRYRK3G2sMRA/_f1gaei3aN5q8y13OFDsyYM_25u90xzUoozEj5P1Fks"
                ],
                description: "Кроссовки Баленсиага в большом количестве расцветок. Идеальное качество исполнения.",
                specs: "• Цвет: All Colors\n• Размеры: 35 - 46\n• Комплект: Коробка, пыльник"
            },
            {
                id: 3,
                name: "Stone Island Sweater (Washed)",
                type: "Replica",
                category: "hoodies",
                images: ["https://dl.springsfern.in/dl/AAAAADCx4UBRWIk7G2sM4A/ikoVbJdlh0IEy1Ymsix-kf5C0XW1O7fkf9_ZdsxqmHg"],
                description: "Свитер Стонайланд с эффектом выцветания ткани (Washed effect). Легендарный патч на рукаве.",
                specs: "• Цвет: Dark Gray, Black\n• Размеры: M, L, XL, 2XL\n• Эффект: Vintage Wash"
            },
        ];

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(item => `
                <div class="card">
                    <div class="image-container" onclick="openDetail(${item.id})">
                        <img src="${item.images[0]}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                    </div>
                    <div class="info">
                        <div class="name-type">
                            <span class="item-name">${item.name}</span>
                            <span class="item-type">${item.type}</span>
                        </div>
                        <a href="https://web.telegram.org/k/#@bluorabot" class="btn" target="_blank">INFO</a>
                    </div>
                </div>
            `).join('');
        }

        function filter(cat) { 
            render(cat === 'all' ? products : products.filter(p => p.category === cat)); 
        }

        let currentItem = null;
        let currentImgIndex = 0;

        function openDetail(id) {
            currentItem = products.find(p => p.id === id);
            if (!currentItem) return;
            document.getElementById('detail-name').innerText = currentItem.name;
            document.getElementById('detail-desc').innerText = currentItem.description;
            document.getElementById('detail-specs').innerText = currentItem.specs;
            currentImgIndex = 0;
            updateSliderView();
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }

        function updateSliderView() {
            document.getElementById('detail-img').src = currentItem.images[currentImgIndex];
        }

        function nextImg() {
            currentImgIndex = (currentImgIndex + 1) % currentItem.images.length;
            updateSliderView();
        }

        function prevImg() {
            currentImgIndex = (currentImgIndex - 1 + currentItem.images.length) % currentItem.images.length;
            updateSliderView();
        }

        render(products);
    </script>
</body>
</html>
