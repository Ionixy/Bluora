<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluora Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #222222;
            --card-bg: #333333;
            --text-white: #ffffff;
            --accent-white: #ffffff;
            --text-dark: #000000;
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: 140px;
            margin: 30px 0 20px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1;
        }
        .logo:hover { 
            opacity: 0.8;
            transform: scale(1.02);
        }

        #main-view { width: 100%; display: flex; flex-direction: column; align-items: center; }

        .categories {
            display: flex; gap: 12px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 50px;
            padding: 0 20px; max-width: 900px;
        }

        .cat-btn {
            background-color: var(--accent-white);
            color: var(--text-dark);
            border: none; padding: 10px 24px;
            border-radius: 25px;
            font-weight: 800; text-transform: uppercase;
            font-size: 12px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .cat-btn:hover { 
            background-color: var(--bg-color);
            color: var(--text-white);
            outline: 1px solid var(--text-white);
        }

        .product-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 30px; max-width: 1100px; width: 90%;
            padding-bottom: 60px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px; overflow: hidden;
            display: flex; flex-direction: column;
            align-items: center; padding-bottom: 25px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .card:hover { transform: translateY(-8px); }

        .image-container {
            width: 90%; aspect-ratio: 4 / 5; 
            background-color: var(--accent-white);
            border-radius: 15px; margin-top: 15px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: pointer;
        }
        .image-container img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.4s ease; }
        .image-container:hover img { transform: scale(1.08); }

        .info { text-align: center; padding: 0 15px; width: 100%; box-sizing: border-box; }
        .name-type { font-size: 16px; font-weight: 800; margin: 20px 0 15px; min-height: 42px; }
        .item-type { color: #aaaaaa; font-weight: 500; font-size: 13px; }

        .card-buttons { display: flex; justify-content: center; width: 90%; }
        
        .btn {
            text-transform: uppercase; font-weight: 800; font-size: 13px;
            text-decoration: none; padding: 12px 0; border-radius: 12px;
            display: block; width: 100%; text-align: center;
            background-color: var(--accent-white);
            color: var(--text-dark);
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .btn:hover { 
            background-color: var(--bg-color);
            color: var(--text-white);
            border-color: var(--text-white);
            transform: translateY(-2px);
        }

        /* ДЕТАЛЬНОЕ ОКНО */
        #detail-view { display: none; width: 100%; max-width: 950px; padding: 20px; animation: fadeIn 0.4s ease; }
        .detail-card { background-color: var(--card-bg); border-radius: 25px; padding: 40px; display: flex; gap: 50px; align-items: center; }
        .detail-slider { flex: 1.2; background-color: var(--accent-white); border-radius: 20px; aspect-ratio: 3 / 4; position: relative; overflow: hidden; }
        .detail-slider img { width: 100%; height: 100%; object-fit: contain; padding: 20px; box-sizing: border-box; }
        
        .detail-info { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .detail-name { font-size: 34px; font-weight: 800; margin-bottom: 25px; }
        .detail-specs { white-space: pre-line; margin-bottom: 25px; color: #ccc; }
        
        .detail-buy-btn {
            background-color: var(--accent-white); color: var(--text-dark);
            text-decoration: none; padding: 16px 0; border-radius: 14px;
            font-weight: 800; width: 100%; max-width: 300px;
            display: block; text-transform: uppercase;
            transition: all 0.3s ease; border: 1px solid transparent;
        }
        .detail-buy-btn:hover {
            background-color: var(--bg-color);
            color: var(--text-white);
            border-color: var(--text-white);
            transform: translateY(-3px);
        }

        .detail-cancel-btn { background: none; border: none; color: #aaaaaa; margin-top: 20px; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-card { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="logo" onclick="closeDetail()">Bluora</div>

    <div id="main-view">
        <nav class="categories">
            <button class="cat-btn" onclick="filter('all')">ALL</button>
            <button class="cat-btn" onclick="filter('shirts')">SHIRTS</button>
            <button class="cat-btn" onclick="filter('pants')">PANTS</button>
            <button class="cat-btn" onclick="filter('hoodies')">HOODIES</button>
            <button class="cat-btn" onclick="filter('hats')">HATS</button>
            <button class="cat-btn" onclick="filter('shoes')">SHOES</button>
            <button class="cat-btn" onclick="filter('accessories')">ACCESSORIES</button>
        </nav>
        <main class="product-grid" id="grid"></main>
    </div>

    <div id="detail-view">
        <div class="detail-card">
            <div class="detail-slider">
                <img id="detail-img" src="" alt="">
            </div>
            <div class="detail-info">
                <h2 class="detail-name" id="detail-name">Clothes Name</h2>
                <div class="detail-desc" id="detail-desc"></div>
                <div class="detail-specs" id="detail-specs"></div>
                <a href="https://t.me/bluoralv" class="detail-buy-btn" target="_blank">INFO</a>
                <button class="detail-cancel-btn" onclick="closeDetail()">cancel</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                name: "Polo Ralph Lauren",
                type: "Replica",
                category: "shirts",
                images: ["https://big-tall.com/cdn/shop/products/s7-1355336_lifestyle.png?v=1728922275"],
                description: "Базовая оверсайз футболка.",
                specs: "- цвета: черный\n- размеры: S, M, L"
            },
            {
                id: 2,
                name: "Acne Studio Hoodie",
                type: "Replica",
                category: "hoodies",
                images: ["https://www.acnestudios.com/dw/image/v2/AAXV_PRD/on/demandware.static/-/Sites-acne-product-catalog/default/dwe37b921b/images/CI/CI0136-/2000x/CI0136-900_Z.jpg?sw=1120&sh=1680"],
                description: "Бомбовая худи Акне Студио",
                specs: "- цвета: черный"
            },
            {
                id: 3,
                name: "Diesel Jeans",
                type: "Replica",
                category: "pants",
                images: ["https://images.clothes.com/example-jeans.jpg"],
                description: "Классические джинсы Diesel.",
                specs: "- Denim\n- Slim Fit"
            },
            {
                id: 4,
                name: "Zip-Up Hoodie PRL",
                type: "Replica",
                category: "hoodies",
                images: ["https://img01.ztat.net/article/spp-media-p1/509f9b0f498f4db9963170b173602ad9/72a44035208a480582b153883a9d1c80.jpg?imwidth=762&filter=packshot"],
                description: "Grey Zip-Up hoodie",
                specs: "- цвета: GREY\n- размеры: S, M, L"
            },
            {
                id: 5,
                name: "Eternal Script Tee",
                type: "Custom",
                category: "shirts",
                images: ["https://i.ibb.co/LzNfG0p/eternal.png"], 
                description: "Футболка с каллиграфическим принтом 'Eternal'.",
                specs: "- 100% хлопок\n- принт: шелкография"
            },
            {
                id: 6,
                name: "Gothic Cross Hoodie",
                type: "Custom",
                category: "hoodies",
                images: ["https://i.ibb.co/mS4z9W6/cross.png"],
                description: "Худи с готическим крестом и цитатой.",
                specs: "- Плотность: 450г/м\n- Оверсайз крой"
            }
        ];

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(item => `
                <div class="card">
                    <div class="image-container" onclick="openDetail(${item.id})">
                        <img src="${item.images[0]}" alt="${item.name}">
                    </div>
                    <div class="info">
                        <div class="name-type">${item.name}<br><span class="item-type">${item.type}</span></div>
                        <div class="card-buttons">
                            <a href="https://t.me/bluoralv" class="btn" target="_blank">INFO</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filter(cat) {
            render(cat === 'all' ? products : products.filter(p => p.category === cat));
        }

        function openDetail(id) {
            const item = products.find(p => p.id === id);
            if (!item) return;
            document.getElementById('detail-name').innerText = item.name;
            document.getElementById('detail-desc').innerText = item.description;
            document.getElementById('detail-specs').innerText = item.specs;
            document.getElementById('detail-img').src = item.images[0];
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
        }

        render(products);
    </script>
</body>
</html>
