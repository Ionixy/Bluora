        { id: 21, name: "Rick Owens Vans", type: "Replica", category: "shoes", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1773342050/riki_00036_cuudxd.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773342047/riki_00037_yefmma.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773342047/riki_00038_plm468.png"], description: "Rick Owens Vans low", specs: "- Colors : Black,White,Grey(leather), Black, Pink(canvas), Black, Light grey, Brown, Pitaya(suede)\n- Sizes : 36-48", isNewDrop: false, newDropUntil: null },
        { id: 22, name: "Supreme Satin Applique Hoodie", type: "Replica", category: "hoodies", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1773691224/SUCHKA1_00039_b3epqb.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773691224/SUCHKA1_00040_ajg4wl.png"], description: "Supreme Satin Appliqué Hoodie", specs: "- Colors : Black and White, Gray and White\n- Sizes : S-XL", isNewDrop: false, newDropUntil: null },
        { id: 23, name: "ERD Hoodie", type: "Replica", category: "hoodies", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1773691224/SUCHKA1_00041_glio30.png"], description: "ERD Hoodie with print", specs: "- Colors : Floral Gray\n- Sizes : S-XL", isNewDrop: false, newDropUntil: null },
        { id: 24, name: "Typography Tee", type: "Replica", category: "shirts", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1773691225/SUCHKA1_00042_wkkejy.png"], description: "Archive Tee", specs: "- Colors : Black\n- Sizes : M-4XL", isNewDrop: false, newDropUntil: null },
        { id: 25, name: "Acne Studio Longsleeve", type: "Replica", category: "shirts", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1773775091/A1_00043_a79grl.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773775090/A1_00044_t2mgdc.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773775092/A1_00045_atthku.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773775090/A1_00044_t2mgdc.png","https://res.cloudinary.com/dwacujq5u/image/upload/v1773775091/A1_00047_l3ebyy.png"], description: "Acne Studios 1996 stamp logo", specs: "- Colors : White, Black, Pink, Sky Blue, Green, Navy Blue, Wine Red\n- Sizes : S-L", isNewDrop: false, newDropUntil: null },
        { id: 26, name: "Ysl Sweatshirt", type: "Replica", category: "hoodies", images: ["https://res.cloudinary.com/dicw3zojk/image/upload/v1774120524/suchka_nxfccj.png"], description: "Navy Blue Ysl sweatshirt", specs: "- Colors : White, Navy Blue\n- Sizes : S-2XL", isNewDrop: false, newDropUntil: null },
        { id: 27, name: "Balenciaga Double Waist Shorts", type: "Replica", category: "pants", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1774197230/Balcncn_fne9fu.png"], description: "Double Waist Balenciaga shorts", specs: "- Colors : White, Black\n- Sizes : S-XL", isNewDrop: false, newDropUntil: null },
        { id: 28, name: "Balenciaga Double Waist Shorts", type: "Replica", category: "pants", images: ["https://res.cloudinary.com/dwacujq5u/image/upload/v1774198600/badshgjbajdh_scyity.png"], description: "Double Waist Balenciaga shorts", specs: "- Colors : White, Black\n- Sizes : S-XL", isNewDrop: false, newDropUntil: null }
    ];

    // Глобальные переменные
    let currentCategory = 'all';
    let currentSearch = '';
    let currentTopFilter = 'all';
    let currentDetailItem = null;
    let currentImgIndex = 0;
    let isAdminAuthenticated = false;
    const ADMIN_PASSWORD = "U_!2sQodiKL9-?2";
    let editingProductId = null;

    function isProductNew(p) {
        return p.isNewDrop && p.newDropUntil && Date.now() < p.newDropUntil;
    }

    function getSortedProducts() {
        const newDrop = products.filter(p => isProductNew(p)).sort((a,b)=>b.id-a.id);
        const regular = products.filter(p => !isProductNew(p)).sort((a,b)=>b.id-a.id);
        return [...newDrop, ...regular];
    }

    function renderProducts() {
        const grid = document.getElementById('grid');
        const counter = document.getElementById('productCounter');
        if (!grid) {
            console.error('Grid element not found');
            return;
        }
        let filtered = getSortedProducts().filter(p => {
            if (currentSearch && !p.name.toLowerCase().includes(currentSearch.toLowerCase())) return false;
            if (currentCategory !== 'all' && p.category !== currentCategory) return false;
            if (currentTopFilter === 'new' && !isProductNew(p)) return false;
            return true;
        });
        if (counter) counter.innerText = `📦 ${filtered.length} product${filtered.length !== 1 ? 's' : ''} found`;
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="text-align:center; padding:40px;">No products found</div>';
            return;
        }
        grid.innerHTML = filtered.map(p => `
            <div class="card">
                <div class="image-container" onclick="openDetail(${p.id})">
                    ${isProductNew(p) ? '<span class="new-badge">NEW DROP</span>' : ''}
                    <img src="${p.images[0]}" loading="lazy" alt="${p.name}">
                </div>
                <div class="info">
                    <div class="name-type">${p.name}<span class="item-type">${p.type}</span></div>
                    <button class="btn-buy" onclick="openDetail(${p.id})">DETAILS</button>
                </div>
            </div>
        `).join('');
    }

    function openDetail(id) {
        const p = products.find(p => p.id === id);
        if (!p) return;
        currentDetailItem = p;
        currentImgIndex = 0;
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        document.getElementById('detail-name').innerText = p.name;
        document.getElementById('detail-desc').innerHTML = p.description;
        let lines = p.specs.split('\n');
        let formatted = lines.map(line => {
            if (line.trim().startsWith('- ')) {
                return line.replace(/^(- .*?)(:| :)/, '<span class="spec-bold">$1$2</span>');
            }
            return line;
        }).join('<br>');
        document.getElementById('detail-specs').innerHTML = formatted;
        const hasMultiple = p.images.length > 1;
        document.getElementById('prevBtn').style.display = hasMultiple ? 'flex' : 'none';
        document.getElementById('nextBtn').style.display = hasMultiple ? 'flex' : 'none';
        updateDetailImage();
        renderThumbnails();
    }

    function updateDetailImage() {
        const img = document.getElementById('detail-img');
        if (currentDetailItem && currentDetailItem.images.length) {
            img.src = currentDetailItem.images[currentImgIndex % currentDetailItem.images.length];
        }
        document.querySelectorAll('.thumbnail').forEach((thumb, idx) => {
            if (idx === currentImgIndex) thumb.classList.add('active');
            else thumb.classList.remove('active');
        });
    }

    function renderThumbnails() {
        const strip = document.getElementById('thumbnailStrip');
        if (!currentDetailItem) return;
        if (currentDetailItem.images.length <= 1) {
            strip.innerHTML = '';
            return;
        }
        strip.innerHTML = currentDetailItem.images.map((img, idx) =>
            `<img class="thumbnail ${idx === currentImgIndex ? 'active' : ''}" src="${img}" onclick="setImageIndex(${idx})">`
        ).join('');
    }

    function setImageIndex(idx) { currentImgIndex = idx; updateDetailImage(); }
    function nextImg() { if (currentDetailItem?.images.length > 1) { currentImgIndex = (currentImgIndex + 1) % currentDetailItem.images.length; updateDetailImage(); } }
    function prevImg() { if (currentDetailItem?.images.length > 1) { currentImgIndex = (currentImgIndex - 1 + currentDetailItem.images.length) % currentDetailItem.images.length; updateDetailImage(); } }
    function closeDetail() { document.getElementById('main-view').style.display = 'block'; document.getElementById('detail-view').style.display = 'none'; renderProducts(); }

    // Фильтры
    function initFilters() {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => { currentSearch = e.target.value; renderProducts(); });
        }
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTopFilter = btn.dataset.filter;
                renderProducts();
            });
        });
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.cat;
                renderProducts();
            });
        });
    }

    // Админ-панель (упрощённая, но рабочая)
    function showPasswordModal() { document.getElementById('passwordModal').classList.add('active'); document.getElementById('adminPassword').focus(); }
    function checkPasswordAndOpenAdmin() {
        if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
            isAdminAuthenticated = true;
            document.getElementById('passwordModal').classList.remove('active');
            openAdminPanel();
        } else {
            document.getElementById('passwordError').innerText = 'Wrong password.';
        }
    }
    function openAdminPanel() {
        if (!isAdminAuthenticated) { showPasswordModal(); return; }
        renderAdminPanel();
        document.getElementById('adminModal').classList.add('active');
    }
    function renderAdminPanel() {
        const container = document.getElementById('adminPanelContent');
        const sorted = getSortedProducts();
        container.innerHTML = `
            <div class="admin-header"><h2>Admin Dashboard</h2><button class="close-admin" onclick="closeAdminModal()">&times;</button></div>
            <div class="admin-search"><input type="text" id="adminSearchInput" placeholder="Search products..."></div>
            <div class="admin-products-grid" id="adminProductsGrid"></div>
            <div class="admin-form">
                <h3 id="formTitle">➕ Add New Product</h3>
                <input type="text" id="prodName" placeholder="Product Name">
                <select id="prodCategory">
                    <option value="shirts">SHIRTS</option><option value="pants">PANTS</option><option value="hoodies">HOODIES</option>
                    <option value="hats">HATS</option><option value="shoes">SHOES</option><option value="accessories">ACCESSORIES</option>
                </select>
                <input type="text" id="prodImages" placeholder="Image URLs (comma separated)">
                <textarea id="prodSpecs" placeholder="Specifications (use format '- Color : value\\n- Size : value')"></textarea>
                <textarea id="prodDesc" placeholder="Description"></textarea>
                <label class="checkbox-label"><input type="checkbox" id="prodIsNew"> Mark as New Drop</label>
                <div style="display:flex; gap:10px; justify-content:flex-end;">
                    <button class="btn-secondary" onclick="resetAdminForm()">Cancel</button>
                    <button class="btn-primary" id="saveProductBtn">Save Product</button>
                </div>
            </div>
        `;
        const refreshList = () => {
            const searchVal = document.getElementById('adminSearchInput')?.value.toLowerCase() || '';
            const filtered = sorted.filter(p => p.name.toLowerCase().includes(searchVal));
            const gridDiv = document.getElementById('adminProductsGrid');
            if (gridDiv) {
                gridDiv.innerHTML = filtered.map(p => `
                    <div class="admin-product-card">
                        <img class="admin-product-img" src="${p.images[0]}">
                        <div class="admin-product-info"><div class="admin-product-name">${p.name}</div><div class="admin-product-cat">${p.category}</div></div>
                        <div class="admin-product-actions">
                            <button class="edit-btn" onclick="editProductForm(${p.id})"><i class="fas fa-edit"></i></button>
                            <button class="clone-btn" onclick="cloneProduct(${p.id})"><i class="fas fa-copy"></i></button>
                            <button class="delete-btn" onclick="deleteProductConfirm(${p.id})"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `).join('');
            }
        };
        setTimeout(() => {
            const searchInput = document.getElementById('adminSearchInput');
            if (searchInput) searchInput.addEventListener('input', refreshList);
            refreshList();
            document.getElementById('saveProductBtn').onclick = () => saveProduct();
        }, 10);
    }
    function resetAdminForm() {
        editingProductId = null;
        document.getElementById('formTitle').innerText = '➕ Add New Product';
        document.getElementById('prodName').value = '';
        document.getElementById('prodCategory').value = 'shirts';
        document.getElementById('prodImages').value = '';
        document.getElementById('prodSpecs').value = '';
        document.getElementById('prodDesc').value = '';
        document.getElementById('prodIsNew').checked = false;
    }
    function editProductForm(id) {
        const p = products.find(p => p.id === id);
        if (!p) return;
        editingProductId = id;
        document.getElementById('formTitle').innerText = '✏️ Edit Product';
        document.getElementById('prodName').value = p.name;
        document.getElementById('prodCategory').value = p.category;
        document.getElementById('prodImages').value = p.images.join(', ');
        document.getElementById('prodSpecs').value = p.specs;
        document.getElementById('prodDesc').value = p.description;
        document.getElementById('prodIsNew').checked = p.isNewDrop;
    }
    function cloneProduct(id) {
        const original = products.find(p => p.id === id);
        if (!original) return;
        const newId = Math.max(...products.map(p => p.id), 0) + 1;
        const clone = { ...original, id: newId, name: original.name + ' (copy)', isNewDrop: false, newDropUntil: null };
        products.push(clone);
        renderAdminPanel();
        renderProducts();
    }
    function saveProduct() {
        const name = document.getElementById('prodName').value.trim();
        if (!name) return alert('Name required');
        const category = document.getElementById('prodCategory').value;
        let imagesRaw = document.getElementById('prodImages').value;
        let images = imagesRaw ? imagesRaw.split(',').map(s => s.trim()).filter(s => s) : ['https://picsum.photos/id/1/400/500'];
        const desc = document.getElementById('prodDesc').value || 'No description';
        let specs = document.getElementById('prodSpecs').value || '- Colors : ...\n- Sizes : ...';
        const isNew = document.getElementById('prodIsNew').checked;
        if (editingProductId !== null) {
            const idx = products.findIndex(p => p.id === editingProductId);
            if (idx !== -1) {
                products[idx] = { ...products[idx], name, category, images, description: desc, specs, isNewDrop: isNew, newDropUntil: isNew ? Date.now() + 7*24*60*60*1000 : null };
            }
        } else {
            const newId = Math.max(...products.map(p => p.id), 0) + 1;
            products.push({ id: newId, name, type: 'Replica', category, images, description: desc, specs, isNewDrop: isNew, newDropUntil: isNew ? Date.now() + 7*24*60*60*1000 : null });
        }
        renderAdminPanel();
        renderProducts();
        if (currentDetailItem && !products.find(p => p.id === currentDetailItem.id)) closeDetail();
    }
    function deleteProductConfirm(id) {
        if (confirm('Delete product?')) {
            products = products.filter(p => p.id !== id);
            renderAdminPanel();
            renderProducts();
            if (currentDetailItem && currentDetailItem.id === id) closeDetail();
        }
    }
    function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); }

    // Инициализация
    window.addEventListener('DOMContentLoaded', function() {
        initFilters();
        renderProducts();
        // Кнопка "наверх"
        const goTop = document.getElementById('goTop');
        if (goTop) {
            window.addEventListener('scroll', () => goTop.classList.toggle('visible', window.scrollY > 300));
            goTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }
        document.getElementById('adminBtn').addEventListener('click', () => isAdminAuthenticated ? openAdminPanel() : showPasswordModal());
        document.getElementById('submitPasswordBtn').addEventListener('click', checkPasswordAndOpenAdmin);
        document.getElementById('adminPassword').addEventListener('keypress', e => { if (e.key === 'Enter') checkPasswordAndOpenAdmin(); });
        // Глобальные функции для onclick
        window.openDetail = openDetail;
        window.closeDetail = closeDetail;
        window.nextImg = nextImg;
        window.prevImg = prevImg;
        window.setImageIndex = setImageIndex;
        window.closeAdminModal = closeAdminModal;
        window.editProductForm = editProductForm;
        window.deleteProductConfirm = deleteProductConfirm;
        window.resetAdminForm = resetAdminForm;
        window.cloneProduct = cloneProduct;
        window.saveProduct = saveProduct;
        console.log('Initialized, products count:', products.length);
    });
    // Дополнительная перестраховка
    setTimeout(() => { if (document.getElementById('grid') && document.getElementById('grid').innerHTML === '') renderProducts(); }, 500);
</script>
</body>
